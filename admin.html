<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#17332A">
<title>La Torre — Администратор</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --basalt: #17332A;
        --tuff: #35745A;
        --tuff-light: #5B9678;
        --cream: #F9F6EF;
        --cream-deep: #EFE9DB;
        --ink: #23302A;
        --gold: #AE9159;
        --forest: #2F5847;
        --line: rgba(35,48,42,0.14);
        --card-bg: #ffffff;
        --heading: #17332A;
        --mut: #7E8B82;
        --danger: #A8453A;
    }
    * { box-sizing: border-box; }
    html, body { touch-action: pan-x pan-y; }
    body {
        font-family: 'Work Sans', sans-serif;
        margin: 0;
        background: var(--cream);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
    }

    /* ---- Шапка ---- */
    .topbar {
        background: var(--basalt); color: #F2F6F0;
        padding: 14px 18px;
        display: flex; align-items: center; justify-content: space-between;
        position: sticky; top: 0; z-index: 20;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .brand-name { font-family: 'Fraunces', serif; font-size: 16px; letter-spacing: 0.18em; }
    .brand-role { font-size: 10px; letter-spacing: 0.14em; color: var(--gold); text-transform: uppercase; }
    .logout-btn {
        background: none; border: 1px solid rgba(242,246,240,0.35); color: #F2F6F0;
        font-size: 12px; padding: 6px 14px; border-radius: 999px; cursor: pointer; display: none;
        font-family: inherit;
    }

    .wrap { max-width: 640px; margin: 0 auto; padding: 18px 14px 80px; }

    /* ---- Вход ---- */
    .login-card {
        background: var(--card-bg); border: 1px solid var(--line); border-radius: 18px;
        padding: 28px 24px; max-width: 380px; margin: 9vh auto 0;
        box-shadow: 0 12px 34px rgba(23,51,42,0.09);
    }
    .login-card h1 { font-family: 'Fraunces', serif; font-size: 22px; margin: 0 0 4px; color: var(--heading); }
    .login-card p { margin: 0 0 18px; font-size: 13px; color: var(--mut); }
    .inp {
        width: 100%; padding: 11px 13px; border: 1px solid var(--line); border-radius: 10px;
        font-family: inherit; font-size: 14.5px; background: #fff; color: var(--ink);
        margin-bottom: 10px;
    }
    .inp:focus { outline: none; border-color: var(--tuff-light); }
    textarea.inp { resize: none; }
    .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 7px;
        background: var(--tuff); color: #fff; border: none; border-radius: 10px;
        padding: 12px 16px; font-family: inherit; font-size: 14px; font-weight: 600;
        cursor: pointer; transition: background 0.2s ease; width: 100%;
    }
    .btn:hover { background: var(--forest); }
    .btn:disabled { opacity: 0.55; cursor: default; }
    .btn.ghost { background: none; color: var(--ink); border: 1px solid var(--line); }
    .btn.ghost:hover { background: var(--cream-deep); }
    .btn.sm { width: auto; padding: 8px 14px; font-size: 12.5px; border-radius: 999px; }
    .login-error { color: var(--danger); font-size: 12.5px; min-height: 16px; margin-top: 8px; }
    .back-link { display: block; text-align: center; margin-top: 16px; font-size: 12.5px; color: var(--mut); text-decoration: none; }

    /* ---- Панель ---- */
    #dashboard { display: none; }

    .statG { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .statC {
        background: var(--card-bg); border: 1px solid var(--line); border-radius: 14px;
        padding: 12px; font-size: 11.5px; color: var(--mut);
    }
    .statC b { display: block; font-size: 20px; color: var(--heading); margin-top: 3px; font-family: 'Fraunces', serif; }

    .h2 {
        font-family: 'Fraunces', serif; font-size: 17px; color: var(--heading);
        margin: 0;
    }
    .sec-head { display: flex; align-items: center; justify-content: space-between; margin: 4px 0 12px; }

    /* Дом-строка как в ДомБукинге */
    .house-row {
        display: flex; align-items: center; gap: 11px;
        background: var(--card-bg); border: 1px solid var(--line); border-radius: 14px;
        padding: 10px 12px; margin-bottom: 9px;
    }
    .hr-ph {
        width: 48px; height: 48px; border-radius: 10px; overflow: hidden;
        background: var(--cream-deep); flex-shrink: 0;
    }
    .hr-ph img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hr-info { flex: 1; min-width: 0; }
    .hr-title { font-size: 13.5px; font-weight: 600; color: var(--heading); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hr-meta { font-size: 12px; color: var(--mut); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .icon-btn {
        border: 1px solid var(--line); background: none; border-radius: 10px;
        width: 34px; height: 34px; cursor: pointer; font-size: 14px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center; color: var(--ink);
    }
    .icon-btn:hover { background: var(--cream-deep); }
    .icon-btn.danger { color: var(--danger); }

    /* Брони */
    .bk-card {
        background: var(--card-bg); border: 1px solid var(--line); border-radius: 14px;
        padding: 12px 14px; margin-bottom: 9px; font-size: 13px;
    }
    .bk-line1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .bk-line1 strong { color: var(--heading); }
    .bk-meta { color: var(--mut); font-size: 12px; margin-top: 3px; line-height: 1.5; }
    .status-badge {
        font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase;
        background: rgba(168,69,58,0.12); color: var(--danger);
        padding: 2px 8px; border-radius: 999px;
    }
    .cancel-btn {
        margin-top: 8px; background: none; border: 1px solid var(--tuff);
        color: var(--tuff); font-size: 12px; padding: 5px 12px; border-radius: 999px;
        cursor: pointer; font-family: inherit;
    }
    .refresh-btn {
        background: none; border: 1px solid var(--line); color: var(--ink);
        font-size: 12px; padding: 6px 14px; border-radius: 999px; cursor: pointer;
        font-family: inherit;
    }
    .empty { color: var(--mut); font-size: 13px; padding: 14px 2px; }

    /* ---- Шторка редактирования (sheet) ---- */
    .sheet {
        position: fixed; inset: 0; z-index: 100;
        background: rgba(13,26,21,0.45);
        display: none; align-items: flex-end; justify-content: center;
    }
    .sheet.open { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheetIn {
        background: var(--cream); width: 100%; max-width: 560px;
        border-radius: 20px 20px 0 0;
        max-height: 92vh; overflow-y: auto;
        padding: 22px 18px 34px;
        animation: slideUp 0.28s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
    .sheetIn .h2 { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .lbl { display: block; font-size: 11.5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--mut); margin: 12px 0 5px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Фото-миниатюры в форме */
    .thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .thumb {
        position: relative; width: 74px; height: 56px; border-radius: 10px; overflow: hidden;
        background: var(--cream-deep);
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumbX {
        position: absolute; top: 3px; right: 3px; width: 19px; height: 19px; border-radius: 50%;
        background: rgba(13,26,21,0.75); color: #fff; border: none; font-size: 11px;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .thumbStar { position: absolute; top: 2px; left: 2px; background: rgba(0,0,0,.55); color: #ffd479; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; line-height: 1; cursor: pointer; }
    .thumbMain { position: absolute; bottom: 2px; left: 2px; background: rgba(0,0,0,.6); color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 6px; }
    .upBtn {
        width: 74px; height: 56px; border: 1.5px dashed var(--line); border-radius: 10px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-size: 11px; color: var(--tuff); cursor: pointer; gap: 2px;
    }
    .status-msg { font-size: 12.5px; color: var(--forest); min-height: 16px; margin-top: 10px; }
</style>
</head>
<body>

<div class="topbar">
    <a class="brand" href="index.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M8 21V10.5C8 7 9.8 3 12 3C14.2 3 16 7 16 10.5V21" stroke="#F2F6F0" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9.5 21V16.5C9.5 15.1 10.6 14 12 14C13.4 14 14.5 15.1 14.5 16.5V21" stroke="#F2F6F0" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6.5 21H17.5" stroke="#F2F6F0" stroke-width="1.4" stroke-linecap="round"/>
            <circle cx="12" cy="9" r="1.3" fill="#AE9159"/>
        </svg>
        <div>
            <div class="brand-name">LA TORRE</div>
            <div class="brand-role">Панель администратора</div>
        </div>
    </a>
    <button class="logout-btn" id="logout-btn" onclick="logout()">Выйти</button>
</div>

<!-- ===== Вход ===== -->
<div id="login-screen">
    <div class="login-card">
        <h1>Вход администратора</h1>
        <p>Управление домами и бронями La Torre</p>
        <input type="password" class="inp" id="admin-pass" placeholder="Пароль" onkeydown="if(event.key==='Enter')tryLogin()">
        <button class="btn" id="login-btn" onclick="tryLogin()">Войти</button>
        <div class="login-error" id="login-error"></div>
        <a class="back-link" href="index.html">← Вернуться на сайт</a>
    </div>
</div>

<!-- ===== Панель ===== -->
<div class="wrap" id="dashboard">

    <div class="statG">
        <div class="statC">Домов<b id="stat-houses">…</b></div>
        <div class="statC">Актуальных броней<b id="stat-bookings">…</b></div>
        <div class="statC">Сумма броней<b id="stat-revenue" style="font-size:14px">…</b></div>
    </div>

    <div class="sec-head">
        <div class="h2">Дома</div>
        <button class="btn sm" onclick="startEdit(null)">+ Добавить дом</button>
    </div>
    <div id="houses-list"><div class="empty">Загрузка...</div></div>

    <div class="sec-head" style="margin-top: 26px;">
        <div class="h2">Брони</div>
        <button class="refresh-btn" onclick="loadBookings()">Обновить</button>
    </div>
    <div id="bookings-list"><div class="empty">Загрузка...</div></div>
</div>

<!-- ===== Шторка: добавление/редактирование дома ===== -->
<div class="sheet" id="edit-sheet" onclick="if(event.target===this)closeEdit()">
    <div class="sheetIn">
        <div class="h2" id="edit-title">Добавить дом</div>

        <label class="lbl">Название</label>
        <input type="text" class="inp" id="ef-name" placeholder="Например: Дом с террасой">

        <div class="row2">
            <div>
                <label class="lbl">Цена за ночь ֏</label>
                <input type="number" class="inp" id="ef-price" min="0" step="1000">
            </div>
            <div>
                <label class="lbl">Адрес</label>
                <input type="text" class="inp" id="ef-address" placeholder="ул. Абовяна 12">
            </div>
        </div>

        <label class="lbl">Описание</label>
        <textarea class="inp" id="ef-desc" rows="4" placeholder="Расскажите гостям об этом доме: комнаты, удобства, что рядом..."></textarea>

        <label class="lbl">Фото</label>
        <div class="thumbs" id="ef-thumbs"></div>

        <div class="status-msg" id="ef-status"></div>

        <div class="row2" style="margin-top: 16px;">
            <button class="btn ghost" onclick="closeEdit()">Отмена</button>
            <button class="btn" id="ef-save-btn" onclick="saveHouse()">Сохранить</button>
        </div>
        <div id="ef-hide-zone" style="margin-top: 12px; display: none;">
            <button class="btn ghost" id="ef-hide-btn" style="color: var(--danger); border-color: rgba(168,69,58,0.4);"></button>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  НАСТРОЙКА: тот же адрес Apps Script, что и в index.html
    // ============================================================
    const SHEET_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxB6QHkL-8cdy21ZpwqF3zF37g0nQQKIFPdB3iF2qzDXrnxIv9LHoWFXPQ4HYma8J_U/exec';

    // Адрес прокси на Render — через него админка правит каталог домов
    // (файл houses.json в репозитории). Токен GitHub хранится на сервере.
    const PROXY_URL = 'ВАШ_PROXY_URL'; // напр. https://la-torre-bnovo.onrender.com

    const isConfigured = (val) => val && !val.startsWith('ВАШ_');
    let pass = null;
    let housesCache = [];
    let editingId = null;         // null = новый дом
    let pendingPhotos = [];       // фото, выбранные до сохранения нового дома (dataURL)

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function fixDriveUrl(url) {
        const m = String(url).match(/drive\.google\.com\/uc\?export=view&id=([\w-]+)/);
        return m ? `https://drive.google.com/thumbnail?id=${m[1]}&sz=w1600` : url;
    }
    function normDate(val) {
        const s = String(val);
        return s.includes('T') ? s.split('T')[0] : s;
    }
    async function api(params) {
        // t=Date.now() делает каждый запрос уникальным — телефоны (особенно
        // iPhone) не смогут подсунуть закэшированный старый ответ
        const qs = new URLSearchParams({ ...params, pass, t: Date.now() }).toString();
        const res = await fetch(`${SHEET_WEBAPP_URL}?${qs}`, { cache: 'no-store' });
        return res.json();
    }
    async function post(body) {
        const res = await fetch(SHEET_WEBAPP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ ...body, pass })
        });
        return res.json();
    }

    // ---------- Вход ----------
    async function tryLogin() {
        const errEl = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');
        const val = document.getElementById('admin-pass').value.trim();
        if (!val) { errEl.innerText = 'Введите пароль'; return; }
        if (!isConfigured(SHEET_WEBAPP_URL)) {
            errEl.innerText = 'Сначала укажите адрес Apps Script в настройках admin.html';
            return;
        }
        btn.disabled = true;
        errEl.innerText = 'Проверяю...';
        try {
            const res = await fetch(`${SHEET_WEBAPP_URL}?action=bookings&pass=${encodeURIComponent(val)}&t=${Date.now()}`, { cache: 'no-store' });
            const data = await res.json();
            if (Array.isArray(data)) {
                pass = val;
                try { sessionStorage.setItem('latorre_admin', val); } catch (e) {}
                showDashboard(data);
            } else {
                errEl.innerText = 'Неверный пароль';
            }
        } catch (e) {
            errEl.innerText = 'Ошибка соединения. Попробуйте ещё раз.';
        }
        btn.disabled = false;
    }

    async function showDashboard(bookingsData) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('logout-btn').style.display = 'inline-block';
        // Сначала дома (чтобы в бронях были их названия), затем брони
        await loadHouses();
        if (bookingsData) renderBookings(bookingsData);
        else loadBookings();
    }

    function logout() {
        pass = null;
        try { sessionStorage.removeItem('latorre_admin'); } catch (e) {}
        location.reload();
    }

    (function autoLogin() {
        try {
            const saved = sessionStorage.getItem('latorre_admin');
            if (saved) {
                document.getElementById('admin-pass').value = saved;
                tryLogin();
            }
        } catch (e) {}
    })();

    // ---------- Статистика ----------
    function updateStats(bookings) {
        document.getElementById('stat-houses').innerText = housesCache.length;
        if (bookings) {
            const active = bookings.filter(b => b.status !== 'Отменена');
            document.getElementById('stat-bookings').innerText = active.length;
            const sum = active.reduce((acc, b) => acc + (parseInt(String(b.total).replace(/\D/g, ''), 10) || 0), 0);
            document.getElementById('stat-revenue').innerText = sum ? sum.toLocaleString() + ' ֏' : '—';
        }
    }

    // ---------- Дома ----------
    function roomNameById(id) {
        const h = housesCache.find(x => String(x.id) === String(id));
        return h ? h.name : `Номер ${id}`;
    }

    // ---------- Запросы к прокси ----------
    async function proxy(path, body) {
        if (!isConfigured(PROXY_URL)) return { ok: false, error: 'Не указан PROXY_URL в admin.html' };
        try {
            const res = await fetch(`${PROXY_URL}${path}`, {
                method: body ? 'POST' : 'GET',
                headers: { 'Content-Type': 'application/json' },
                body: body ? JSON.stringify({ ...body, pass }) : undefined
            });
            return await res.json();
        } catch (e) {
            return { ok: false, error: 'Нет связи с сервером (Render мог заснуть — повторите через минуту)' };
        }
    }

    async function loadHouses() {
        const list = document.getElementById('houses-list');
        try {
            const data = await proxy('/api/houses');
            if (!data.ok) { list.innerHTML = `<div class="empty">${escapeHtml(data.error || 'Ошибка загрузки')}</div>`; return; }
            housesCache = data.houses || [];
            updateStats();
            if (!housesCache.length) { list.innerHTML = '<div class="empty">Домов пока нет — добавьте первый.</div>'; return; }
            list.innerHTML = housesCache.map(h => {
                const cover = (h.photos && h.photos.length) ? h.photos[0] : '';
                const hidden = h.visible === false;
                return `
                <div class="house-row" style="${hidden ? 'opacity:.5' : ''}">
                    <div class="hr-ph">${cover ? `<img src="${escapeHtml(cover)}" alt="">` : ''}</div>
                    <div class="hr-info">
                        <div class="hr-title">${escapeHtml(h.name)}${hidden ? ' · скрыт' : ''}</div>
                        <div class="hr-meta">${Number(h.price).toLocaleString()} ֏ / ночь${h.address ? ' · ' + escapeHtml(h.address) : ''} · ${(h.photos || []).length} фото</div>
                    </div>
                    <button class="icon-btn" title="${hidden ? 'Показать на сайте' : 'Скрыть с сайта'}" onclick="toggleVisible(${h.id}, ${hidden})">${hidden ? '👁' : '🚫'}</button>
                    <button class="icon-btn" title="Изменить" onclick="startEdit(${h.id})">✎</button>
                    <button class="icon-btn danger" title="Удалить навсегда" onclick="deleteHouse(${h.id})">✕</button>
                </div>`;
            }).join('');
        } catch (e) {
            list.innerHTML = '<div class="empty">Ошибка соединения</div>';
        }
    }

    // Скрыть/показать: дом исчезает с сайта, но данные и фото сохраняются
    async function toggleVisible(id, makeVisible) {
        const data = await proxy('/api/houses/visible', { id, visible: makeVisible });
        if (data.ok) loadHouses();
        else alert('Ошибка: ' + (data.error || ''));
    }

    async function deleteHouse(id) {
        const h = housesCache.find(x => Number(x.id) === Number(id));
        const name = h ? h.name : `дом ${id}`;
        if (!confirm(`Удалить «${name}» НАВСЕГДА?\n\nДом исчезнет с сайта, все его фото будут удалены. Вернуть будет невозможно.\n\nЕсли нужно просто убрать его с сайта на время — используйте кнопку «Скрыть».`)) return;
        if (!confirm('Точно удалить? Это действие необратимо.')) return;
        const data = await proxy('/api/houses/delete', { id });
        if (data.ok) loadHouses();
        else alert('Ошибка: ' + (data.error || ''));
    }

    // ---------- Шторка добавления/редактирования ----------
    function startEdit(id) {
        editingId = id;
        pendingPhotos = [];
        const h = id === null ? null : housesCache.find(x => x.id === id);
        document.getElementById('edit-title').innerText = h ? 'Изменить дом' : 'Добавить дом';
        document.getElementById('ef-name').value = h ? h.name : '';
        document.getElementById('ef-price').value = h ? h.price : '';
        document.getElementById('ef-address').value = h ? (h.address || '') : '';
        document.getElementById('ef-desc').value = h ? (h.description || '') : '';
        document.getElementById('ef-status').innerText = '';
        document.getElementById('ef-hide-zone').style.display = 'none';
        renderThumbs([]);
        document.getElementById('edit-sheet').classList.add('open');
        if (h) loadEditPhotos(id);
    }

    function closeEdit() {
        document.getElementById('edit-sheet').classList.remove('open');
        editingId = null;
        pendingPhotos = [];
    }

    function loadEditPhotos(id) {
        const h = housesCache.find(x => Number(x.id) === Number(id));
        renderThumbs(h && Array.isArray(h.photos) ? h.photos : []);
    }

    function renderThumbs(serverUrls) {
        const box = document.getElementById('ef-thumbs');
        let html = '';
        // Фото, уже лежащие в репозитории. Первое — главное (обложка карточки).
        html += serverUrls.map((url, i) => `
            <span class="thumb">
                <img src="${escapeHtml(url)}" alt="">
                ${i === 0 ? '<span class="thumbMain">главное</span>' :
                  `<button class="thumbStar" title="Сделать главным" onclick="makeCover('${encodeURIComponent(url)}')">★</button>`}
                <button class="thumbX" onclick="deleteServerPhoto('${encodeURIComponent(url)}')">×</button>
            </span>
        `).join('');
        // Фото, выбранные локально и ждущие сохранения
        html += pendingPhotos.map((p, i) => `
            <span class="thumb"><img src="${p.dataUrl}" alt="">
                <button class="thumbX" onclick="removePending(${i})">×</button></span>
        `).join('');
        html += `
            <label class="upBtn">＋<span>фото</span>
                <input type="file" accept="image/*" multiple style="display:none" onchange="onFiles(event)">
            </label>`;
        box.innerHTML = html;
        box.dataset.serverUrls = JSON.stringify(serverUrls);
    }

    function onFiles(event) {
        const files = [...(event.target.files || [])];
        if (!files.length) return;
        const status = document.getElementById('ef-status');
        status.innerText = 'Обрабатываю фото...';
        let done = 0;
        files.forEach(file => {
            const img = new Image();
            const reader = new FileReader();
            reader.onload = (e) => { img.src = e.target.result; };
            img.onload = () => {
                const maxW = 1600;
                const scale = Math.min(1, maxW / img.width);
                const canvas = document.createElement('canvas');
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
                pendingPhotos.push({ dataUrl, base64: dataUrl.split(',')[1] });
                done++;
                if (done === files.length) {
                    status.innerText = '';
                    renderThumbs(JSON.parse(document.getElementById('ef-thumbs').dataset.serverUrls || '[]'));
                }
            };
            reader.readAsDataURL(file);
        });
        event.target.value = '';
    }

    function removePending(i) {
        pendingPhotos.splice(i, 1);
        renderThumbs(JSON.parse(document.getElementById('ef-thumbs').dataset.serverUrls || '[]'));
    }

    async function deleteServerPhoto(encodedUrl) {
        if (editingId === null) return;
        if (!confirm('Удалить это фото?')) return;
        const status = document.getElementById('ef-status');
        status.innerText = 'Удаляю фото...';
        const data = await proxy('/api/houses/photo/delete', { id: editingId, path: decodeURIComponent(encodedUrl) });
        status.innerText = data.ok ? '' : 'Ошибка: ' + (data.error || '');
        if (data.ok) { await loadHouses(); loadEditPhotos(editingId); }
    }

    // Сделать фото главным — оно станет обложкой карточки на сайте
    async function makeCover(encodedUrl) {
        if (editingId === null) return;
        const status = document.getElementById('ef-status');
        status.innerText = 'Меняю главное фото...';
        const data = await proxy('/api/houses/photo/cover', { id: editingId, path: decodeURIComponent(encodedUrl) });
        status.innerText = data.ok ? '' : 'Ошибка: ' + (data.error || '');
        if (data.ok) { await loadHouses(); loadEditPhotos(editingId); }
    }

    async function saveHouse() {
        const name = document.getElementById('ef-name').value.trim();
        const price = document.getElementById('ef-price').value;
        const address = document.getElementById('ef-address').value.trim();
        const description = document.getElementById('ef-desc').value.trim();
        const status = document.getElementById('ef-status');
        const saveBtn = document.getElementById('ef-save-btn');

        if (!name || !price) { status.innerText = 'Укажите название и цену'; return; }
        saveBtn.disabled = true;
        status.innerText = pendingPhotos.length ? `Сохраняю (фото: ${pendingPhotos.length})...` : 'Сохраняю...';

        const data = await proxy('/api/houses/save', {
            id: editingId,
            name, price, address, description,
            photosBase64: pendingPhotos.map(p => p.base64)
        });

        if (!data.ok) { status.innerText = 'Ошибка: ' + (data.error || ''); saveBtn.disabled = false; return; }

        status.innerText = 'Готово ✓ Сайт обновится через 1–2 минуты';
        setTimeout(() => { closeEdit(); loadHouses(); }, 1200);
        saveBtn.disabled = false;
    }

    // ---------- Брони ----------
    async function loadBookings() {
        const list = document.getElementById('bookings-list');
        list.innerHTML = '<div class="empty">Загрузка...</div>';
        try {
            const data = await api({ action: 'bookings' });
            if (!Array.isArray(data)) { list.innerHTML = '<div class="empty">Ошибка загрузки</div>'; return; }
            renderBookings(data);
        } catch (e) {
            list.innerHTML = '<div class="empty">Ошибка соединения</div>';
        }
    }

    function renderBookings(data) {
        const list = document.getElementById('bookings-list');
        updateStats(data);
        if (!data.length) { list.innerHTML = '<div class="empty">Актуальных броней нет</div>'; return; }
        list.innerHTML = data.map(b => `
            <div class="bk-card">
                <div class="bk-line1">
                    <strong>${escapeHtml(roomNameById(b.room))}</strong>
                    — ${escapeHtml(normDate(b.checkin))} → ${escapeHtml(normDate(b.checkout))}
                    ${b.status === 'Отменена' ? '<span class="status-badge">Отменена</span>' : ''}
                </div>
                <div class="bk-meta">
                    ${escapeHtml(b.name)}, ${escapeHtml(b.phone)} · взрослых: ${escapeHtml(b.adults)}, детей: ${escapeHtml(b.kids)}, животных: ${escapeHtml(b.pets)}<br>
                    Сумма: ${escapeHtml(b.total)}
                </div>
                ${b.status !== 'Отменена' ? `<button class="cancel-btn" onclick="cancelBooking('${escapeHtml(b.id)}')">Отменить бронь</button>` : ''}
            </div>
        `).join('');
    }

    async function cancelBooking(id) {
        if (!confirm('Отменить эту бронь? Даты освободятся для новых гостей.')) return;
        try {
            const data = await post({ type: 'cancelBooking', id });
            if (data.ok) {
                loadBookings(); // список придёт уже без этой брони
            } else {
                alert('Не удалось отменить: ' + (data.error || 'ошибка'));
            }
        } catch (e) {
            alert('Ошибка соединения — попробуйте ещё раз');
        }
    }
</script>
