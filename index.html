<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Torre Boutique Hotel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#17332A">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="La Torre">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        /* Палитра "Ботанический отель": глубокая сосновая зелень,
           белый воздух и светлый открытый беж с золотым акцентом */
        --basalt: #17332A;        /* тёмные поверхности: шапка, футер */
        --basalt-soft: #21453A;
        --tuff: #35745A;          /* главный акцент: кнопки, активные элементы */
        --tuff-light: #5B9678;
        --cream: #F9F6EF;         /* фон страницы: светлый открытый беж */
        --cream-deep: #EFE9DB;
        --ink: #23302A;
        --gold: #AE9159;
        --forest: #2F5847;
        --forest-light: #4E7A64;
        --line: rgba(35,48,42,0.14);
        --card-bg: #ffffff;
        --input-bg: #ffffff;
        --heading: #17332A;
        --text-secondary: #4E5C54;
        --text-muted: #7E8B82;
        --transition-theme: background 0.35s ease, color 0.35s ease, border-color 0.35s ease;
    }
    body.theme-dark {
        --cream: #0F1D17;
        --cream-deep: #16281F;
        --ink: #E9EFE9;
        --card-bg: #182B22;
        --input-bg: #1E332A;
        --line: rgba(233,239,233,0.14);
        --heading: #F2F6F0;
        --text-secondary: #C2CFC5;
        --text-muted: #93A399;
    }
    body { transition: var(--transition-theme); }
    .card, .booking-panel, .admin-modal-content, .comment-form input, .comment-form textarea,
    .booking-panel input, .booking-panel select { transition: var(--transition-theme); }
    * { box-sizing: border-box; }
    /* Запрет масштабирования жестами: iOS Safari игнорирует user-scalable=no,
       поэтому дублируем через touch-action (разрешаем только прокрутку). */
    html, body { touch-action: pan-x pan-y; }
    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }
    body {
        font-family: 'Work Sans', sans-serif;
        margin: 0;
        background: var(--cream);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .logo { font-family: 'Fraunces', serif; }

    /* ---------- Header ---------- */
    header {
        background: var(--basalt);
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand svg { width: 22px; height: 22px; flex-shrink: 0; }
    .logo { font-weight: 700; color: var(--cream); font-size: 20px; letter-spacing: 2px; }

    .lang-container {
        display: flex;
        background: rgba(255,255,255,0.08);
        border-radius: 999px;
        padding: 3px;
        gap: 2px;
        position: relative;
    }
    .lang-btn {
        background: none;
        border: none;
        padding: 6px 11px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
        font-family: 'Work Sans', sans-serif;
        letter-spacing: 0.4px;
        color: rgba(242,234,224,0.6);
        transition: color 0.25s ease;
        position: relative;
        z-index: 1;
    }
    .lang-btn.active { color: var(--basalt); }
    .lang-slider {
        position: absolute;
        top: 3px; bottom: 3px; left: 3px;
        width: 52px;
        background: var(--cream);
        border-radius: 999px;
        transition: left 0.3s cubic-bezier(.4,0,.2,1), width 0.3s cubic-bezier(.4,0,.2,1);
        z-index: 0;
    }

    /* ---------- Hero ---------- */
    .hero {
        text-align: center;
        padding: 44px 20px 36px;
        background: linear-gradient(180deg, var(--basalt) 0%, var(--basalt) 55%, var(--cream) 100%);
        position: relative;
        overflow: hidden;
    }
    .hero-sky {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 50% 30%, rgba(174,145,89,0.30), transparent 60%);
        animation: glow 8s ease-in-out infinite;
    }
    @keyframes glow {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
    }
    .ararat { position: relative; margin: 0 auto 18px; width: 220px; display: block; animation: araratFloat 7s ease-in-out infinite; }
    @keyframes araratFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
    }
    .ararat .sun { animation: sunPulse 5s ease-in-out infinite; transform-origin: center; }
    @keyframes sunPulse {
        0%, 100% { opacity: 0.45; transform: scale(1); }
        50% { opacity: 0.85; transform: scale(1.1); }
    }
    .ararat .stars circle { animation: twinkle 3.2s ease-in-out infinite; }
    .ararat .stars circle:nth-child(2) { animation-delay: 0.7s; }
    .ararat .stars circle:nth-child(3) { animation-delay: 1.4s; }
    .ararat .stars circle:nth-child(4) { animation-delay: 2.1s; }
    .ararat .stars circle:nth-child(5) { animation-delay: 0.35s; }
    @keyframes twinkle {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 1; }
    }
    .ararat .peak-back { opacity: 0.55; }
    .ararat .peak-main { stroke: var(--gold); }
    .ararat .hero-tower-light {
        animation: towerFlicker 3.4s ease-in-out infinite;
        filter: drop-shadow(0 0 2.5px rgba(174, 145, 89, 0.9));
    }
    @keyframes towerFlicker {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.7; }
        74%      { opacity: 0.92; }
    }
    .hero h1 {
        position: relative;
        color: var(--cream);
        margin: 0 0 10px 0;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.5px;
    }
    .hero p {
        position: relative;
        margin: 0;
        color: var(--cream-deep);
        font-size: 14.5px;
        letter-spacing: 0.3px;
    }

    /* ---------- Room cards ---------- */
    .rooms { padding: 30px 16px 50px; display: grid; gap: 28px; max-width: 520px; margin: 0 auto; }

    .card {
        background: var(--card-bg);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(27,24,22,0.08);
        display: flex;
        flex-direction: column;
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .card.is-visible { opacity: 1; transform: translateY(0); }

    .image-container {
        position: relative;
        width: 100%;
        height: 230px;
        cursor: pointer;
        overflow: hidden;
        border-radius: 0 0 130px 130px / 0 0 90px 90px;
    }
    .card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s ease; }
    .image-container:hover img { transform: scale(1.06); }

    .room-numeral {
        position: absolute;
        top: 14px; left: 14px;
        font-family: 'Fraunces', serif;
        font-size: 15px;
        font-weight: 600;
        color: var(--cream);
        background: rgba(27,24,22,0.55);
        backdrop-filter: blur(3px);
        width: 34px; height: 34px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        letter-spacing: 0.5px;
    }
    .gallery-hint {
        position: absolute; bottom: 12px; left: 14px;
        background: rgba(27,24,22,0.6);
        color: var(--cream);
        padding: 5px 10px;
        font-size: 11px;
        border-radius: 999px;
        pointer-events: none;
        letter-spacing: 0.2px;
    }

    .card-info { padding: 20px 20px 18px; flex-grow: 1; display: flex; flex-direction: column; }
    .card-info h3 { margin: 0 0 4px 0; color: var(--heading); font-size: 21px; font-weight: 600; }
    /* ---------- Каталог: поиск и фильтры ---------- */
    .catalog-controls { margin: 0 0 18px; }
    .search-row { display: flex; align-items: center; gap: 8px; }
    .search-row .search-box { flex: 1; }
    .catalog-refresh {
        width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
        background: var(--card-bg); border: 1px solid var(--line);
        color: var(--text-secondary); cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: color 0.2s ease, border-color 0.2s ease;
        box-shadow: 0 2px 10px rgba(23,51,42,0.05);
    }
    .catalog-refresh:hover { color: var(--tuff); border-color: var(--tuff-light); }
    .catalog-refresh.spinning svg { animation: spinRefresh 0.8s linear infinite; }
    @keyframes spinRefresh { to { transform: rotate(360deg); } }
    .search-box {
        display: flex; align-items: center; gap: 9px;
        background: var(--card-bg); border: 1px solid var(--line); border-radius: 999px;
        padding: 11px 16px; color: var(--text-muted);
        box-shadow: 0 2px 10px rgba(23,51,42,0.05);
    }
    .search-box input {
        flex: 1; border: none; outline: none; background: none;
        font-family: inherit; font-size: 14.5px; color: var(--ink);
    }
    .filter-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .chip {
        background: var(--card-bg); border: 1px solid var(--line); border-radius: 999px;
        padding: 7px 14px; font-family: inherit; font-size: 12.5px; font-weight: 600;
        color: var(--text-secondary); cursor: pointer; transition: all 0.2s ease;
    }
    .chip.on { background: var(--tuff); border-color: var(--tuff); color: #fff; }
    .filter-price-group { display: inline-flex; align-items: center; gap: 6px; }
    .filter-rooms-group { display: inline-flex; align-items: center; gap: 6px; }
    .chip-room {
        background: var(--card-bg); border: 1px solid var(--line); border-radius: 999px;
        padding: 6px 11px; font-family: inherit; font-size: 12.5px; font-weight: 600;
        color: var(--text-secondary); cursor: pointer; transition: all 0.2s ease; margin-right: 4px;
    }
    .chip-room.on { background: var(--tuff); border-color: var(--tuff); color: #fff; }
    .filter-lbl { font-size: 12px; color: var(--text-muted); }
    .price-inp {
        width: 84px; padding: 7px 10px; border: 1px solid var(--line); border-radius: 999px;
        font-family: inherit; font-size: 12.5px; background: var(--card-bg); color: var(--ink);
    }
    .price-inp:focus { outline: none; border-color: var(--tuff-light); }
    #no-results { text-align: center; color: var(--text-muted); font-size: 14px; padding: 40px 0; }

    /* ---------- Каталог: сетка компактных карточек ---------- */
    .rooms-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 18px;
    }
    .house-card {
        background: var(--card-bg); border: 1px solid var(--line); border-radius: 16px;
        overflow: hidden; cursor: pointer;
        transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .house-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(23,51,42,0.10); }
    .hc-photo { position: relative; aspect-ratio: 4 / 3; background: var(--cream-deep); }
    .hc-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hc-price-pill {
        position: absolute; left: 10px; bottom: 10px;
        background: rgba(13,26,21,0.82); color: #fff;
        font-size: 12.5px; font-weight: 600; padding: 5px 11px; border-radius: 999px;
        backdrop-filter: blur(4px);
    }
    .hc-price-pill span { font-weight: 400; opacity: 0.75; font-size: 11px; }
    .hc-numeral {
        position: absolute; top: 10px; left: 10px;
        width: 26px; height: 26px; border-radius: 50%;
        background: rgba(13,26,21,0.6); color: var(--gold);
        font-family: 'Fraunces', serif; font-size: 12px;
        display: flex; align-items: center; justify-content: center;
    }
    .hc-body { padding: 12px 14px 14px; }
    .hc-name { font-family: 'Fraunces', serif; font-size: 16px; color: var(--heading); margin: 0 0 3px; }
    .hc-address {
        display: flex; align-items: center; gap: 5px;
        font-size: 12px; color: var(--text-muted);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hc-address svg { flex-shrink: 0; }

    /* ---------- Страница апартамента ---------- */
    #house-view {
        position: fixed; inset: 0; z-index: 600;
        background: var(--cream);
        transform: translateX(100%);
        transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        visibility: hidden;
    }
    #house-view.open { transform: translateX(0); visibility: visible; }
    body.house-open { overflow: hidden; }
    .hv-topbar {
        position: sticky; top: 0; z-index: 5;
        background: var(--cream);
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
    }
    .hv-back {
        display: inline-flex; align-items: center; gap: 7px;
        background: none; border: none; font-family: inherit;
        font-size: 14px; font-weight: 600; color: var(--heading); cursor: pointer;
        padding: 4px 6px;
    }
    .hv-body { max-width: 640px; margin: 0 auto; padding: 18px 16px 70px; }
    .hv-gallery { position: relative; border-radius: 16px; overflow: hidden; background: var(--cream-deep); }
    .hv-main-img { width: 100%; aspect-ratio: 16 / 10; object-fit: cover; display: block; cursor: pointer; }
    .hv-nav {
        position: absolute; top: 50%; transform: translateY(-50%);
        width: 36px; height: 36px; border-radius: 50%;
        background: rgba(13,26,21,0.55); color: #fff; border: none;
        font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .hv-nav.prev { left: 10px; }
    .hv-nav.next { right: 10px; }
    .hv-counter {
        position: absolute; right: 12px; bottom: 10px;
        background: rgba(13,26,21,0.65); color: #fff;
        font-size: 11px; padding: 3px 9px; border-radius: 999px;
    }
    .hv-thumbs { display: flex; gap: 7px; margin-top: 8px; overflow-x: auto; padding-bottom: 4px; }
    .hv-thumb {
        width: 62px; height: 46px; border-radius: 8px; overflow: hidden;
        flex-shrink: 0; cursor: pointer; border: 2px solid transparent; padding: 0; background: var(--cream-deep);
    }
    .hv-thumb.on { border-color: var(--tuff); }
    .hv-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hv-name { font-family: 'Fraunces', serif; font-size: 24px; color: var(--heading); margin: 16px 0 4px; }
    .hv-map-btn {
        display: inline-flex; align-items: center; gap: 7px;
        background: var(--card-bg); border: 1px solid var(--line); border-radius: 999px;
        padding: 8px 14px; margin: 2px 0 10px;
        font-size: 13px; font-weight: 500; color: var(--forest);
        text-decoration: none; max-width: 100%;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .hv-map-btn span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hv-map-btn:hover { border-color: var(--tuff-light); box-shadow: 0 4px 14px rgba(23,51,42,0.10); }
    .hv-map-btn svg { flex-shrink: 0; }
    .hv-price { font-size: 15px; color: var(--forest); font-weight: 600; margin-bottom: 14px; }
    .hv-desc-title { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); margin: 18px 0 6px; }
    .hv-desc { font-size: 14.5px; line-height: 1.65; color: var(--ink); white-space: pre-line; }
    .hv-booking {
        margin-top: 22px; background: var(--card-bg);
        border: 1px solid var(--line); border-radius: 16px; padding: 18px 16px;
    }
    .hv-booking h4 { margin: 0 0 14px; font-size: 15px; color: var(--heading); }
    .hv-booking input, .hv-booking select {
        padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px;
        font-family: 'Work Sans', sans-serif; font-size: 14px; background: var(--input-bg); color: var(--ink);
        width: 100%;
    }
    .hv-booking input:focus, .hv-booking select:focus { outline: none; border-color: var(--tuff-light); }
    .hv-comments { margin-top: 22px; }

    .room-address {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        color: var(--text-muted);
        text-decoration: none;
        margin: 2px 0 6px;
        border-bottom: 1px dotted transparent;
        transition: color 0.2s ease, border-color 0.2s ease;
        max-width: 100%;
    }
    .room-address:hover { color: var(--tuff); border-bottom-color: var(--tuff-light); }
    .room-address svg { flex-shrink: 0; }
    .price-tag { color: var(--forest); font-weight: 600; font-size: 15px; margin-bottom: 10px; font-family: 'Work Sans', sans-serif; }
    .tag {
        display: inline-block;
        background: rgba(53,116,90,0.12);
        color: var(--tuff);
        padding: 4px 11px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.3px;
        align-self: flex-start;
        margin-bottom: 12px;
    }
    .features { font-size: 13.5px; color: var(--text-secondary); margin: 0 0 16px 0; padding-left: 18px; line-height: 1.6; }
    .features li::marker { color: var(--tuff-light); }

    .open-booking-btn {
        background: var(--tuff);
        color: #fff;
        border: none;
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 14.5px;
        font-family: 'Work Sans', sans-serif;
        cursor: pointer;
        letter-spacing: 0.3px;
        transition: background 0.2s ease, transform 0.15s ease;
    }
    .open-booking-btn:hover { background: var(--forest); }
    .open-booking-btn:active { transform: scale(0.98); }
    .open-booking-btn .chev { display: inline-block; margin-left: 6px; transition: transform 0.3s ease; }
    .open-booking-btn.expanded .chev { transform: rotate(180deg); }

    /* ---------- Booking accordion ---------- */
    .booking-panel {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 0.4s cubic-bezier(.4,0,.2,1);
        background: #FBF7F2;
        border-top: 1px solid transparent;
    }
    .booking-panel.open {
        grid-template-rows: 1fr;
        border-top: 1px solid var(--line);
    }
    .panel-inner { overflow: hidden; min-height: 0; }
    .panel-inner-pad { padding: 18px 20px; }

    .booking-panel h4 {
        margin: 0 0 14px 0;
        color: var(--heading);
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 8px;
        font-family: 'Work Sans', sans-serif;
    }

    .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .form-group { flex: 1; display: flex; flex-direction: column; }
    .form-group label {
        font-size: 10.5px;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .booking-panel input, .booking-panel select {
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 14px;
        font-family: 'Work Sans', sans-serif;
        background: var(--input-bg);
        color: var(--ink);
        box-sizing: border-box;
        width: 100%;
        transition: border-color 0.2s ease;
    }
    .booking-panel input:focus, .booking-panel select:focus {
        outline: none;
        border-color: var(--tuff-light);
    }

    .phone-input-row { display: flex; gap: 6px; }
    .phone-country-select { flex: 0 0 100px; padding-left: 6px !important; padding-right: 4px !important; }
    .phone-custom-code { flex: 0 0 74px; text-align: center; }
    .phone-input-row input { flex: 1; min-width: 0; }

    .date-picker-btn {
        width: 100%;
        display: flex; align-items: center; justify-content: space-between;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--input-bg);
        color: var(--ink);
        font-family: 'Work Sans', sans-serif;
        font-size: 14px;
        cursor: pointer;
        transition: var(--transition-theme), border-color 0.2s ease;
    }
    .date-picker-btn:hover { border-color: var(--tuff-light); }
    .date-picker-btn svg { color: var(--text-muted); flex-shrink: 0; margin-left: 8px; }

    .calendar-modal {
        display: none;
        position: fixed; inset: 0; z-index: 9997;
        background: rgba(13,26,21,0.85);
        justify-content: center; align-items: center;
        padding: 16px;
    }
    .calendar-modal.open { display: flex; animation: fadeIn 0.2s ease; }
    .calendar-modal-content {
        background: var(--card-bg);
        border-radius: 18px;
        padding: 20px 18px 18px;
        max-width: 360px;
        width: 100%;
        position: relative;
        transition: var(--transition-theme);
    }
    .calendar-modal .close-btn { top: -12px; right: -4px; color: var(--heading); }
    .calendar-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 14px;
    }
    .calendar-header button {
        background: none; border: 1px solid var(--line); border-radius: 50%;
        width: 30px; height: 30px; cursor: pointer; color: var(--heading);
        display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .calendar-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; color: var(--heading); text-transform: capitalize; }
    .calendar-weekdays, .calendar-days {
        display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; text-align: center;
    }
    .calendar-weekdays span { font-size: 10.5px; color: var(--text-muted); font-weight: 600; padding-bottom: 6px; }
    .calendar-day {
        aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
        border-radius: 8px; font-size: 12.5px; cursor: pointer; color: var(--ink);
        position: relative; user-select: none;
    }
    .calendar-day.empty { cursor: default; }
    .calendar-day.past, .calendar-day.booked {
        color: var(--text-muted); opacity: 0.4; cursor: not-allowed; text-decoration: line-through;
    }
    .calendar-day.today { font-weight: 700; box-shadow: inset 0 0 0 1.5px var(--tuff-light); }
    .calendar-day:not(.empty):not(.past):not(.booked):hover { background: rgba(53,116,90,0.14); }
    .calendar-day.in-range { background: rgba(53,116,90,0.16); border-radius: 0; }
    .calendar-day.range-start { background: var(--tuff); color: #fff; border-radius: 8px 0 0 8px; }
    .calendar-day.range-end { background: var(--tuff); color: #fff; border-radius: 0 8px 8px 0; }
    .calendar-day.range-single { background: var(--tuff); color: #fff; border-radius: 8px; }
    .calendar-hint { font-size: 11.5px; color: var(--text-muted); text-align: center; margin-top: 12px; min-height: 16px; }
    .calendar-confirm-btn {
        width: 100%; margin-top: 10px;
        background: var(--forest); color: #fff; border: none;
        padding: 11px; border-radius: 8px; font-weight: 600; font-size: 13.5px; cursor: pointer;
    }
    .calendar-confirm-btn:disabled { background: #D6DBD3; color: var(--text-muted); cursor: not-allowed; }

    .availability-note {
        font-size: 11.5px;
        color: var(--text-muted);
        margin: -4px 0 12px;
        line-height: 1.8;
    }
    .availability-note:empty { display: none; }
    .booked-label { margin-right: 4px; }
    .booked-chip {
        display: inline-block;
        background: rgba(53,116,90,0.14);
        color: var(--tuff);
        padding: 2px 8px;
        border-radius: 999px;
        margin: 0 4px 4px 0;
        font-weight: 600;
        white-space: nowrap;
    }

    .summary-box {
        background: var(--cream-deep);
        padding: 12px 14px;
        border-radius: 8px;
        margin: 14px 0;
        font-size: 13.5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 600;
        color: var(--heading);
    }

    .confirm-btn {
        background: var(--forest);
        color: white;
        border: none;
        width: 100%;
        padding: 13px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 14px;
        font-family: 'Work Sans', sans-serif;
        cursor: pointer;
        letter-spacing: 0.3px;
        transition: background 0.2s ease, transform 0.15s ease;
    }
    .confirm-btn:hover:not(:disabled) { background: #32493e; }
    .confirm-btn:active:not(:disabled) { transform: scale(0.98); }
    .confirm-btn:disabled { background: #D6DBD3; cursor: not-allowed; color: var(--text-muted); }

    /* ---------- Lightbox ---------- */
    .lightbox {
        display: none;
        position: fixed;
        z-index: 9999;
        left: 0; top: 0; width: 100%; height: 100%;
        background-color: rgba(13,26,21,0.96);
        justify-content: center;
        align-items: center;
        touch-action: none;
    }
    .lightbox.open { display: flex; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .lightbox-content { position: relative; width: 92%; max-width: 500px; text-align: center; }
    .lightbox-img { width: 100%; border-radius: 10px; object-fit: contain; max-height: 68vh; }
    .close-btn {
        position: absolute; top: -48px; right: 6px;
        color: var(--cream); font-size: 32px; font-weight: 300; cursor: pointer;
        font-family: 'Work Sans', sans-serif;
    }
    .nav-btn {
        position: absolute; top: 50%; transform: translateY(-50%);
        background: rgba(255,255,255,0.12);
        color: var(--cream);
        border: none;
        font-size: 20px;
        width: 42px; height: 42px;
        border-radius: 50%;
        cursor: pointer;
        transition: background 0.2s ease;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.22); }
    .prev-btn { left: -6px; } .next-btn { right: -6px; }
    .gallery-counter { color: var(--text-muted); margin-top: 16px; font-size: 13px; letter-spacing: 0.5px; }

    .footer-admin-link {
        display: inline-block;
        margin-top: 8px;
        font-size: 11px;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        text-decoration: none;
        border-bottom: 1px dotted var(--text-muted);
        padding-bottom: 1px;
        transition: color 0.25s ease;
    }
    .footer-admin-link:hover { color: var(--tuff-light); }
    footer {
        text-align: center;
        padding: 26px 20px 34px;
        color: var(--text-muted);
        font-size: 12px;
        letter-spacing: 0.3px;
    }

    /* ---------- Admin ---------- */
    .admin-btn {
        background: rgba(255,255,255,0.08);
        border: none;
        color: rgba(242,234,224,0.7);
        width: 30px; height: 30px;
        border-radius: 50%;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        margin-right: 8px;
        transition: background 0.2s ease;
    }
    .admin-btn:hover { background: rgba(255,255,255,0.16); }
    .admin-modal {
        display: none;
        position: fixed; inset: 0; z-index: 9998;
        background: rgba(13,26,21,0.85);
        justify-content: center; align-items: center;
        padding: 20px;
    }
    .admin-modal.open { display: flex; animation: fadeIn 0.25s ease; }
    .admin-modal-content {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 26px 22px;
        max-width: 420px;
        width: 100%;
        max-height: 82vh;
        overflow-y: auto;
        position: relative;
    }
    .admin-modal-content h4 {
        margin: 0 0 14px;
        color: var(--heading);
        font-size: 17px;
        font-weight: 600;
    }
    .admin-modal .close-btn { top: -14px; right: -6px; color: var(--heading); }
    .admin-modal-content input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-bottom: 12px;
        font-family: 'Work Sans', sans-serif;
        font-size: 14px;
        box-sizing: border-box;
        background: var(--input-bg);
        color: var(--ink);
    }
    .admin-modal-content button.admin-submit {
        width: 100%;
        background: var(--tuff);
        color: #fff;
        border: none;
        padding: 11px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-family: 'Work Sans', sans-serif;
    }
    .admin-booking-row {
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        line-height: 1.55;
        color: var(--ink);
    }
    .admin-booking-row:last-child { border-bottom: none; }
    .admin-booking-row strong { color: var(--heading); }
    .admin-booking-row.cancelled { opacity: 0.5; }
    .status-tag {
        display: inline-block;
        background: rgba(53,116,90,0.15);
        color: var(--tuff);
        font-size: 10.5px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 999px;
        margin-left: 6px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }
    .cancel-booking-btn {
        display: block;
        margin-top: 8px;
        background: none;
        border: 1px solid var(--tuff);
        color: var(--tuff);
        font-size: 11.5px;
        font-weight: 600;
        padding: 5px 12px;
        border-radius: 999px;
        cursor: pointer;
    }
    .cancel-booking-btn:hover { background: rgba(53,116,90,0.1); }
    .admin-refresh {
        background: none;
        border: 1px solid var(--line);
        color: var(--basalt);
        font-size: 12px;
        padding: 6px 12px;
        border-radius: 999px;
        cursor: pointer;
        margin-bottom: 10px;
    }

    .admin-tabs { display: flex; gap: 6px; margin-bottom: 16px; border-bottom: 1px solid var(--line); }
    .admin-tab {
        background: none; border: none; padding: 8px 4px; margin-right: 10px;
        font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer;
        border-bottom: 2px solid transparent;
    }
    .admin-tab.active { color: var(--tuff); border-bottom-color: var(--tuff); }
    .admin-panel-section { min-height: 60px; }

    .admin-price-row {
        display: flex; align-items: center; justify-content: space-between;
        gap: 10px; margin-bottom: 10px;
    }
    .admin-price-row span { font-size: 13px; color: var(--heading); font-weight: 600; flex-shrink: 0; }
    .admin-price-row input {
        flex: 1; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px;
        font-family: 'Work Sans', sans-serif; font-size: 14px; background: var(--input-bg); color: var(--ink);
    }
    .admin-status-msg { font-size: 12px; color: var(--forest); margin-top: 8px; min-height: 14px; }

    .admin-photo-room-select {
        width: 100%; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px;
        font-family: 'Work Sans', sans-serif; font-size: 14px; background: var(--input-bg); color: var(--ink);
        margin-bottom: 12px;
    }
    .admin-photos-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px;
    }
    .admin-photos-grid > .comments-empty { grid-column: 1 / -1; }
    .admin-photo-thumb { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; }
    .admin-photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .admin-photo-delete {
        position: absolute; top: 3px; right: 3px;
        width: 20px; height: 20px; border-radius: 50%;
        background: rgba(13,26,21,0.75); color: #fff; border: none;
        font-size: 13px; line-height: 1; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
    }
    .admin-upload-btn {
        display: block; text-align: center;
        border: 1px dashed var(--line); border-radius: 8px; padding: 10px;
        font-size: 13px; font-weight: 600; color: var(--tuff); cursor: pointer;
    }
    .admin-upload-btn:hover { border-color: var(--tuff-light); }

    /* ---------- Comments ---------- */
    .comments-section {
        margin: 0 20px 20px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
    }
    .comments-toggle-btn {
        width: 100%;
        background: none;
        border: 1px solid var(--line);
        color: var(--heading);
        padding: 10px;
        border-radius: 8px;
        font-family: 'Work Sans', sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 6px;
        transition: var(--transition-theme), border-color 0.2s ease;
    }
    .comments-toggle-btn:hover { border-color: var(--tuff-light); }
    .comments-toggle-btn .chev { display: inline-block; transition: transform 0.3s ease; font-size: 11px; }
    .comments-toggle-btn.expanded .chev { transform: rotate(180deg); }
    .comments-panel {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 0.4s cubic-bezier(.4,0,.2,1);
    }
    .comments-panel.open { grid-template-rows: 1fr; }
    .comments-panel .panel-inner { overflow: hidden; min-height: 0; }
    .comments-panel .panel-inner-pad { padding-top: 14px; }
    .comments-title {
        margin: 0 0 10px;
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-muted);
        font-weight: 600;
    }
    .comment-item {
        background: var(--cream);
        border-radius: 8px;
        padding: 9px 12px;
        margin-bottom: 8px;
        font-size: 13px;
    }
    .comment-item strong { color: var(--heading); display: block; margin-bottom: 2px; font-size: 12.5px; }
    .comment-item p { margin: 0; color: var(--text-secondary); line-height: 1.5; }
    .comments-empty { font-size: 12.5px; color: var(--text-muted); font-style: italic; }
    .comment-form { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .comment-form input, .comment-form textarea {
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: 'Work Sans', sans-serif;
        font-size: 13px;
        resize: vertical;
        box-sizing: border-box;
        width: 100%;
        background: var(--input-bg);
        color: var(--ink);
    }
    .comment-form button {
        align-self: flex-start;
        background: var(--basalt);
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
    }

    /* ---------- О здании ---------- */
    .about-hotel { padding: 4px 16px 46px; max-width: 520px; margin: 0 auto; }
    .about-photo {
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 14px 34px rgba(27,24,22,0.14);
    }
    .about-photo img { width: 100%; height: 260px; object-fit: cover; display: block; }
    .about-photo::after {
        content: "";
        position: absolute; inset: 0;
        background: linear-gradient(180deg, rgba(27,24,22,0) 55%, rgba(27,24,22,0.55) 100%);
    }
    .about-caption {
        position: absolute; left: 18px; bottom: 14px; z-index: 1;
        color: var(--cream);
        font-family: 'Fraunces', serif;
        font-size: 15px;
        letter-spacing: 0.3px;
    }
    .about-text { text-align: center; margin-top: 20px; }
    .about-text h2 { font-size: 21px; color: var(--heading); margin: 0 0 8px; font-weight: 600; }
    .about-text p { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin: 0; max-width: 420px; margin: 0 auto; }

    /* ---------- Карта ---------- */
    .map-section { padding: 4px 16px 46px; max-width: 520px; margin: 0 auto; text-align: center; }
    .map-section h2 { font-size: 21px; color: var(--heading); margin: 0 0 16px; font-weight: 600; }
    .map-frame-wrap {
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 14px 34px rgba(27,24,22,0.14);
        line-height: 0;
    }
    .map-frame-wrap iframe { width: 100%; height: 240px; border: 0; display: block; filter: grayscale(0.15) contrast(1.05); }
    .map-open-link {
        display: inline-flex; align-items: center; gap: 8px;
        margin-top: 16px;
        padding: 11px 22px;
        border-radius: 999px;
        background: var(--tuff);
        color: #fff;
        text-decoration: none;
        font-size: 13.5px;
        font-weight: 600;
        transition: background 0.2s ease, transform 0.15s ease;
    }
    .map-open-link:hover { background: var(--forest); transform: translateY(-2px); }

    /* ---------- Контакты ---------- */
    .contact-section { padding: 4px 16px 50px; max-width: 520px; margin: 0 auto; text-align: center; }
    /* Компактная версия контактов над поиском */
    .contact-top { padding: 0 0 18px; max-width: none; }
    .contact-top h2 { display: none; }
    .contact-top .contact-buttons { gap: 10px; }
    .contact-top .contact-btn {
        flex-direction: row; width: auto; gap: 7px;
        padding: 9px 16px; border-radius: 999px; font-size: 12.5px;
    }
    .contact-top .contact-icon { width: auto; height: auto; }
    .contact-top .contact-icon svg { width: 16px; height: 16px; display: block; }
    .contact-section h2 { font-size: 21px; color: var(--heading); margin: 0 0 18px; font-weight: 600; }
    .contact-buttons { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
    .contact-btn {
        display: flex; flex-direction: column; align-items: center; gap: 8px;
        width: 92px;
        padding: 16px 8px;
        border-radius: 16px;
        background: var(--card-bg);
        border: 1px solid var(--line);
        text-decoration: none;
        color: var(--heading);
        font-size: 12px;
        font-weight: 600;
        transition: var(--transition-theme), transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s ease;
    }
    .contact-btn:hover { transform: translateY(-5px) scale(1.04); box-shadow: 0 10px 22px rgba(27,24,22,0.14); }
    .contact-btn .contact-icon {
        width: 42px; height: 42px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: #fff;
    }
    .contact-btn.whatsapp .contact-icon { background: #25D366; }
    .contact-btn.instagram .contact-icon { background: linear-gradient(135deg, #f58529, #dd2a7b 45%, #8134af 75%, #515bd4); }
    .contact-btn.phone .contact-icon { background: var(--tuff); }
    .contact-btn.phone .contact-icon { animation: ringPulse 3.5s ease-in-out infinite; }
    @keyframes ringPulse {
        0%, 80%, 100% { box-shadow: 0 0 0 0 rgba(53,116,90,0); }
        85% { box-shadow: 0 0 0 8px rgba(53,116,90,0.18); }
        92% { box-shadow: 0 0 0 0 rgba(53,116,90,0); }
    }

    /* ---------- Установка приложения (PWA) ---------- */
    .install-banner {
        position: fixed;
        left: 12px; right: 12px; bottom: -140px;
        z-index: 500;
        background: var(--basalt);
        border-radius: 16px;
        padding: 14px 14px 14px 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 -8px 28px rgba(0,0,0,0.28);
        transition: bottom 0.4s cubic-bezier(.34,1.56,.64,1);
        max-width: 480px;
        margin: 0 auto;
    }
    .install-banner.show { bottom: 14px; }
    .install-banner img { width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0; }
    .install-banner-text { flex: 1; min-width: 0; }
    .install-banner-text strong { display: block; color: var(--cream); font-size: 13px; font-weight: 600; }
    .install-banner-text span { display: block; color: rgba(242,234,224,0.6); font-size: 11.5px; margin-top: 2px; line-height: 1.4; }
    .install-btn {
        background: var(--tuff);
        color: #fff;
        border: none;
        padding: 9px 14px;
        border-radius: 8px;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .install-close {
        background: none;
        border: none;
        color: rgba(242,234,224,0.5);
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        padding: 4px;
        flex-shrink: 0;
    }
    /* ===== Интро-заставка ===== */
    #intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background:
            radial-gradient(ellipse 120% 90% at 50% 110%, rgba(174, 145, 89, 0.10), transparent 55%),
            #0E1F18;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 1.1s cubic-bezier(0.76, 0, 0.24, 1), opacity 0.9s ease 0.15s;
        will-change: transform, opacity;
    }
    #intro-overlay.intro-done {
        transform: translateY(-100%);
        opacity: 0;
        pointer-events: none;
    }
    #intro-overlay.intro-removed { display: none; }

    .intro-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translateY(6px);
    }

    .intro-tower {
        width: 92px;
        height: 92px;
        overflow: visible;
    }

    /* Башня отрисовывается тонкой линией */
    .intro-stroke {
        stroke-dasharray: 60;
        stroke-dashoffset: 60;
        animation: introDraw 1.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
    }
    .intro-stroke-2 { animation-delay: 0.45s; }
    .intro-ground {
        stroke-dasharray: 16;
        stroke-dashoffset: 16;
        animation: introDraw 0.7s ease-out 0.15s forwards;
    }
    @keyframes introDraw {
        to { stroke-dashoffset: 0; }
    }

    /* Огонёк в окне: мягко "зажигается" с лёгким мерцанием свечи */
    .intro-light {
        opacity: 0;
        transform-origin: 12px 9px;
        animation:
            introLightOn 0.9s ease-out 1.6s forwards,
            introFlicker 3.2s ease-in-out 2.5s infinite;
        filter: drop-shadow(0 0 3px rgba(174, 145, 89, 0.9));
    }
    @keyframes introLightOn {
        0%   { opacity: 0; transform: scale(0.4); }
        60%  { opacity: 1; transform: scale(1.25); }
        100% { opacity: 1; transform: scale(1); }
    }
    @keyframes introFlicker {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.75; }
        72%      { opacity: 0.92; }
    }

    .intro-title {
        margin-top: 22px;
        font-family: 'Fraunces', serif;
        font-size: 26px;
        letter-spacing: 0.34em;
        text-indent: 0.34em; /* компенсирует последний трекинг для точного центра */
        color: #F2EAE0;
        opacity: 0;
        animation: introRise 1.0s cubic-bezier(0.22, 1, 0.36, 1) 1.9s forwards;
    }
    .intro-sub {
        margin-top: 10px;
        font-family: 'Work Sans', sans-serif;
        font-size: 10.5px;
        letter-spacing: 0.52em;
        text-indent: 0.52em;
        color: rgba(174, 145, 89, 0.85);
        opacity: 0;
        animation: introRise 1.0s cubic-bezier(0.22, 1, 0.36, 1) 2.15s forwards;
    }
    @keyframes introRise {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* Пока идёт интро — страница под ним не прокручивается */

<script>
    // ===== Запрет масштабирования на iOS =====
    // Safari на iPhone игнорирует user-scalable=no. Пинч-зум и зум двойным
    // тапом блокирует CSS touch-action: pan-x pan-y (см. стили), а это —
    // страховка для старых версий iOS с жестовыми событиями.
    (function () {
        document.addEventListener('gesturestart', e => e.preventDefault());
    })();

    // ===== Интро-заставка =====
    (function () {
        const overlay = document.getElementById('intro-overlay');
        if (!overlay) return;

        // Показываем интро один раз за сессию (при переустановке PWA или
        // новом заходе — снова). Повторные обновления страницы не раздражают.
        let seen = false;
        try { seen = sessionStorage.getItem('introSeen') === '1'; } catch (e) {}

        if (seen) {
            overlay.remove();
            return;
        }

        document.body.classList.add('intro-active');

        const INTRO_DURATION = 3100; // полный цикл анимации
        const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function finish() {
            overlay.classList.add('intro-done');
            document.body.classList.remove('intro-active');
            try { sessionStorage.setItem('introSeen', '1'); } catch (e) {}
            // Полностью убираем слой после перехода
            setTimeout(() => overlay.classList.add('intro-removed'), 1300);
        }

        setTimeout(finish, reduced ? 900 : INTRO_DURATION);

        // Нетерпеливый гость может пропустить интро касанием
        overlay.addEventListener('click', finish, { once: true });

        // Страховка: что бы ни случилось, через 6 секунд сайт точно виден
        setTimeout(() => {
            if (!overlay.classList.contains('intro-done')) finish();
        }, 6000);
    })();

    let currentLang = 'am';

    // ========================================================================
    // НАСТРОЙКИ ИНТЕГРАЦИЙ — заполните после настройки Telegram-бота и
    // Google Apps Script (см. инструкцию в отдельном файле integration-setup.md)
    // ========================================================================
    const CONFIG = {
        TELEGRAM_BOT_TOKEN: 'ВАШ_BOT_TOKEN',      // получить у @BotFather
        TELEGRAM_CHAT_ID:   'ВАШ_CHAT_ID',        // ваш личный chat_id
        SHEET_WEBAPP_URL:   'https://script.google.com/macros/s/AKfycbytOPRFi8Raq9ddJ3lbguhOi8lA6OCRW_Abe29xwI-Go5z1Zh1Kh4wZKkjilimCaHWV/exec', // /exec ссылка после деплоя Apps Script
        BNOVO_BACKEND_URL:  'ВАШ_BNOVO_BACKEND_URL', // адрес бэкенда на Render, напр. https://la-torre-bnovo.onrender.com
        // Пароль администратора больше не хранится здесь — он задаётся в самой
        // Google Таблице (Apps Script → Project Settings → Script Properties → ADMIN_PASSWORD).
        // Так пароль не виден в исходном коде сайта, даже если сайт лежит в открытом GitHub-репозитории.
        WHATSAPP_NUMBER:    '+37433688444',  // формат: 374XXXXXXXX (без +, без пробелов)
        INSTAGRAM_HANDLE:   '000_111___',       // без @, например latorre.yerevan
        PHONE_NUMBER:       '+37494458080',  // формат: +374XXXXXXXX
        MAP_QUERY:          'ВАШ_АДРЕС_ИЛИ_НАЗВАНИЕ' // например: "La Torre Hotel, Yerevan" или точный адрес
    };
    const isConfigured = (val) => val && !val.startsWith('ВАШ_') && !val.startsWith('смените');

    function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }

    async function sendTelegramNotification(text) {
        if (!isConfigured(CONFIG.TELEGRAM_BOT_TOKEN)) return;
        try {
            await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.TELEGRAM_CHAT_ID, text })
            });
        } catch (e) { console.warn('Telegram notify failed', e); }
    }

    async function sendToSheet(type, data) {
        if (!isConfigured(CONFIG.SHEET_WEBAPP_URL)) return;
        try {
            await fetch(CONFIG.SHEET_WEBAPP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ type, ...data })
            });
        } catch (e) { console.warn('Sheet write failed', e); }
    }

    // Отправка брони в Bnovo через наш бэкенд-прокси (если подключён).
    // Работает "в фоне": даже если Bnovo временно недоступен, бронь уже
    // сохранена в Google Sheets и уведомление отправлено в Telegram.
    async function sendBookingToBnovo(booking) {
        if (!isConfigured(CONFIG.BNOVO_BACKEND_URL)) return;
        try {
            const res = await fetch(`${CONFIG.BNOVO_BACKEND_URL}/api/booking`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(booking)
            });
            const data = await res.json();
            if (!data.ok) console.warn('Bnovo booking failed', data);
        } catch (e) { console.warn('Bnovo booking failed', e); }
    }

    // ---------- Установка приложения (PWA) ----------
    let deferredInstallPrompt = null;
    let installDismissed = false;

    function isIosDevice() {
        return /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
    }
    function isStandalone() {
        return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredInstallPrompt = e;
        if (!installDismissed && !isStandalone()) showInstallBanner();
    });

    function showInstallBanner() {
        document.getElementById('install-banner').classList.add('show');
    }
    function dismissInstallBanner() {
        document.getElementById('install-banner').classList.remove('show');
        installDismissed = true;
    }
    async function handleInstallClick() {
        if (deferredInstallPrompt) {
            deferredInstallPrompt.prompt();
            await deferredInstallPrompt.userChoice;
            deferredInstallPrompt = null;
        }
        dismissInstallBanner();
    }

    function setupInstallBannerForIos() {
        if (isIosDevice() && !isStandalone()) {
            document.getElementById('install-btn').style.display = 'none';
            const iosText = {
                ru: 'Нажмите значок «Поделиться» ⬆️ внизу браузера → «На экран Домой»',
                en: 'Tap the Share icon ⬆️ at the bottom of the browser → "Add to Home Screen"',
                am: 'Սեղմեք «Կիսվել» ⬆️ պատկերակը դիտարկիչի ներքևում → «Ավելացնել Հիմնական էկրանին»'
            };
            document.getElementById('install-sub').innerText = iosText[currentLang];
            setTimeout(showInstallBanner, 2500);
        }
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(() => { /* сайт продолжит работать и без офлайн-кэша */ });
        });
    }

    // ---------- Контакты и карта ----------
    function setupContacts() {
        const wa = document.getElementById('contact-whatsapp');
        const ig = document.getElementById('contact-instagram');
        const ph = document.getElementById('contact-phone');

        if (isConfigured(CONFIG.WHATSAPP_NUMBER)) {
            wa.href = `https://wa.me/${CONFIG.WHATSAPP_NUMBER}`;
            wa.style.display = '';
        } else {
            wa.style.display = 'none';
        }

        if (isConfigured(CONFIG.INSTAGRAM_HANDLE)) {
            ig.href = `https://instagram.com/${CONFIG.INSTAGRAM_HANDLE}`;
            ig.style.display = '';
        } else {
            ig.style.display = 'none';
        }

        if (isConfigured(CONFIG.PHONE_NUMBER)) {
            ph.href = `tel:${CONFIG.PHONE_NUMBER.replace(/\s/g, '')}`;
            document.getElementById('contact-phone-label').innerText = CONFIG.PHONE_NUMBER;
            ph.style.display = '';
        } else {
            ph.style.display = 'none';
        }

    }

    // ---------- Тёмная/светлая тема ----------
    const SUN_ICON = '<path d="M12 3V4.5M12 19.5V21M4.5 12H3M21 12H19.5M6 6L5 5M19 19L18 18M18 6L19 5M5 19L6 18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.4"/>';
    const MOON_ICON = '<path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>';
    let isDarkTheme = false;
    function toggleTheme() {
        isDarkTheme = !isDarkTheme;
        document.body.classList.toggle('theme-dark', isDarkTheme);
        document.getElementById('theme-icon').innerHTML = isDarkTheme ? MOON_ICON : SUN_ICON;
    }

    // ---------- Админ-панель ----------
    // Пароль администратора теперь НЕ хранится на сайте — только на сервере
    // (Script Properties в Apps Script). Мы просто пересылаем то, что человек
    // ввёл, и сервер сам говорит "да/нет".

    // ---------- Отзывы ----------
    async function loadComments(roomId) {
        if (!isConfigured(CONFIG.SHEET_WEBAPP_URL)) return;
        const container = document.getElementById(`comments-${roomId}`);
        try {
            const res = await fetch(`${CONFIG.SHEET_WEBAPP_URL}?action=comments&room=${roomId}&t=${Date.now()}`, { cache: 'no-store' });
            const data = await res.json();
            if (!data.length) return;
            container.innerHTML = data.map(c => `<div class="comment-item"><strong>${escapeHtml(c.name)}</strong><p>${escapeHtml(c.text)}</p></div>`).join('');
        } catch (e) { /* оставляем текст по умолчанию, если таблица ещё не настроена */ }
    }
    function submitComment(roomId) {
        const nameEl = document.getElementById(`cname-${roomId}`);
        const textEl = document.getElementById(`ctext-${roomId}`);
        const name = nameEl.value.trim();
        const text = textEl.value.trim();
        if (!name || !text) {
            const msg = { ru: 'Заполните имя и текст отзыва', en: 'Please fill in your name and review', am: 'Լրացրեք անունը և կարծիքի տեքստը' };
            alert(msg[currentLang]);
            return;
        }
        const container = document.getElementById(`comments-${roomId}`);
        const empty = document.getElementById(`cm-empty-${roomId}`);
        if (empty) empty.remove();
        container.insertAdjacentHTML('beforeend', `<div class="comment-item"><strong>${escapeHtml(name)}</strong><p>${escapeHtml(text)}</p></div>`);
        sendToSheet('comment', { room: roomId, name, text, date: new Date().toISOString() });
        nameEl.value = ''; textEl.value = '';
    }

    // ---------- Динамические дома ----------
    // Список домов приходит из Google Таблицы (лист Rooms, управляется
    // со страницы admin.html). Пока таблица не подключена или недоступна —
    // показываем стартовые четыре номера.
    const ROMAN = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X', 'XI', 'XII'];
    let roomsData = [];

    // Старые 4 номера удалены — каталог целиком приходит из houses.json
    function defaultRooms_() { return []; }

    // ---------- Компактная карточка каталога ----------
    function houseCardHTML_(room, index) {
        const id = room.id;
        const t = translations[currentLang];
        const numeral = ROMAN[index] || String(index + 1);
        const gallery = roomGalleries[id] || [];
        const cover = gallery.length ? gallery[0] : NO_PHOTO_PLACEHOLDER;
        return `
    <div class="house-card reveal" onclick="openHouse(${id})">
        <div class="hc-photo">
            <img src="${cover}" id="cover-img-${id}" alt="${escapeHtml(room.name)}" loading="lazy">
            <span class="hc-numeral">${numeral}</span>
            <div class="hc-price-pill">${(ROOM_PRICES[id] || room.price).toLocaleString()} ֏ <span>/ ${t.nightWord}</span></div>
        </div>
        <div class="hc-body">
            <h3 class="hc-name">${escapeHtml(room.name)}</h3>
            ${room.address ? `<div class="hc-address">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M12 21C12 21 5 14.7 5 9.5C5 5.9 8.1 3 12 3C15.9 3 19 5.9 19 9.5C19 14.7 12 21 12 21Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="9.5" r="2.2" stroke="currentColor" stroke-width="1.6"/></svg>
                ${escapeHtml(room.address)}</div>` : ''}
        </div>
    </div>`;
    }

    // ---------- Поиск, фильтры, сортировка ----------
    let sortMode = null; // null | 'cheap' | 'exp'
    let roomsFilter = null; // null = любое число комнат, иначе число спален

    // Кнопки числа комнат строятся по тому, что реально есть в каталоге
    function renderRoomsChips() {
        const box = document.getElementById('rooms-chips');
        if (!box) return;
        const t = translations[currentLang];
        const counts = [...new Set(roomsData.map(r => Number(r.bedrooms)).filter(Boolean))].sort((a, b) => a - b);
        if (!counts.length) { box.innerHTML = ''; return; }
        box.innerHTML = `<button class="chip-room ${roomsFilter === null ? 'on' : ''}" onclick="setRoomsFilter(null)">${t.roomsAny}</button>`
            + counts.map(n => `<button class="chip-room ${roomsFilter === n ? 'on' : ''}" onclick="setRoomsFilter(${n})">${n}</button>`).join('');
    }

    function setRoomsFilter(n) {
        roomsFilter = (roomsFilter === n) ? null : n;
        renderRoomsChips();
        applyFilters();
    }

    function toggleSort(mode) {
        sortMode = (sortMode === mode) ? null : mode;
        document.getElementById('chip-cheap').classList.toggle('on', sortMode === 'cheap');
        document.getElementById('chip-exp').classList.toggle('on', sortMode === 'exp');
        applyFilters();
    }

    function filteredRooms_() {
        const q = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
        const pFrom = Number(document.getElementById('price-from')?.value) || 0;
        const pTo = Number(document.getElementById('price-to')?.value) || Infinity;
        let list = roomsData.filter(r => {
            const price = ROOM_PRICES[r.id] || r.price;
            if (price < pFrom || price > pTo) return false;
            if (roomsFilter !== null && Number(r.bedrooms) !== roomsFilter) return false;
            if (q && !(`${r.name} ${r.address || ''}`.toLowerCase().includes(q))) return false;
            return true;
        });
        if (sortMode === 'cheap') list = [...list].sort((a, b) => (ROOM_PRICES[a.id] || a.price) - (ROOM_PRICES[b.id] || b.price));
        if (sortMode === 'exp') list = [...list].sort((a, b) => (ROOM_PRICES[b.id] || b.price) - (ROOM_PRICES[a.id] || a.price));
        return list;
    }

    function applyFilters() { renderCatalog(); }

    // Ручное обновление каталога: подтягивает свежий список домов из таблицы
    // (удобно сразу после добавления дома в админке)
    let refreshing = false;
    async function refreshCatalog() {
        if (refreshing) return;
        refreshing = true;
        const btn = document.getElementById('catalog-refresh');
        btn.classList.add('spinning');
        try {
            bnovoBusyCache = null; // сбрасываем и кэш занятости Bnovo
            await fetchHousesJson();
        } finally {
            setTimeout(() => { btn.classList.remove('spinning'); refreshing = false; }, 500);
        }
    }

    function renderCatalog() {
        const container = document.getElementById('rooms-container');
        if (!roomsData.length) roomsData = defaultRooms_();
        roomsData.forEach(r => {
            ROOM_PRICES[r.id] = ROOM_PRICES[r.id] || r.price;
            if (!roomBookedRanges[r.id]) roomBookedRanges[r.id] = [];
            if (!roomGalleries[r.id]) roomGalleries[r.id] = [];
        });
        const list = filteredRooms_();
        container.innerHTML = list.map((r, i) => houseCardHTML_(r, i)).join('');
        const noRes = document.getElementById('no-results');
        noRes.style.display = list.length ? 'none' : 'block';
        noRes.innerText = translations[currentLang].nothingFound;
        revealOnScroll();
    }

    // Совместимость со старым именем
    function renderRooms() { renderCatalog(); }

    // ---------- Страница апартамента ----------
    let openHouseId = null;
    let hvImgIndex = 0;
    const detailLoaded = { avail: {}, comments: {} };

    function houseDetailHTML_(room) {
        const id = room.id;
        const t = translations[currentLang];
        const gallery = roomGalleries[id] || [];
        const imgs = gallery.length ? gallery : [NO_PHOTO_PLACEHOLDER];
        return `
        <div class="hv-gallery">
            <img class="hv-main-img" id="hv-main-img" src="${imgs[0]}" alt="${escapeHtml(room.name)}" onclick="openGallery(${id})">
            ${imgs.length > 1 ? `
                <button class="hv-nav prev" onclick="hvNav(-1)">‹</button>
                <button class="hv-nav next" onclick="hvNav(1)">›</button>
                <span class="hv-counter" id="hv-counter">1 / ${imgs.length}</span>` : ''}
        </div>
        ${imgs.length > 1 ? `<div class="hv-thumbs" id="hv-thumbs">${imgs.map((u, i) =>
            `<button class="hv-thumb ${i === 0 ? 'on' : ''}" onclick="hvGoto(${i})"><img src="${u}" alt=""></button>`).join('')}</div>` : ''}

        <h2 class="hv-name">${escapeHtml(room.name)}</h2>
        ${room.address ? `<a class="hv-map-btn" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(room.address)}" target="_blank" rel="noopener">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 21C12 21 5 14.7 5 9.5C5 5.9 8.1 3 12 3C15.9 3 19 5.9 19 9.5C19 14.7 12 21 12 21Z" stroke="currentColor" stroke-width="1.7"/><circle cx="12" cy="9.5" r="2.2" stroke="currentColor" stroke-width="1.7"/></svg>
            <span>${escapeHtml(room.address)}</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M7 17L17 7M17 7H9M17 7V15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>` : ''}
        <div class="hv-price" id="p${id}"></div>

        ${room.description ? `
            <div class="hv-desc-title">${t.aboutHouse}</div>
            <div class="hv-desc">${escapeHtml(room.description)}</div>` : ''}

        <div class="hv-booking">
            <h4 id="ph${id}">${t.ph}</h4>
            <div class="form-row">
                <div class="form-group" style="flex: 1;">
                    <label id="l-dates-${id}">${t.ldates}</label>
                    <button type="button" class="date-picker-btn" id="date-btn-${id}" onclick="openCalendar(${id})">
                        <span id="date-range-label-${id}">—</span>
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M8 3V7M16 3V7M3 10H21" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                    </button>
                    <input type="hidden" id="in-${id}">
                    <input type="hidden" id="out-${id}">
                </div>
            </div>
            <div class="availability-note" id="avail-${id}"></div>
            <div class="form-row">
                <div class="form-group">
                    <label id="l-ad-${id}">${t.lad}</label>
                    <select id="adults-${id}"><option>1</option><option selected>2</option><option>3</option><option>4</option></select>
                </div>
                <div class="form-group">
                    <label id="l-ch-${id}">${t.lch}</label>
                    <select id="kids-${id}"><option>0</option><option>1</option><option>2</option></select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label id="l-pet-${id}">${t.lpet}</label>
                    <select id="pets-${id}"><option selected>0</option><option>1</option><option>2</option></select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label id="l-name-${id}">${t.lname}</label>
                    <input type="text" id="guest-name-${id}" placeholder="${t.commentNamePh}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label id="l-phone-${id}">${t.lphone}</label>
                    <div class="phone-input-row">
                        <select id="phone-country-${id}" class="phone-country-select" onchange="onCountryChange(${id})"></select>
                        <input type="tel" id="phone-custom-${id}" class="phone-custom-code" placeholder="+___" inputmode="numeric" style="display:none">
                        <input type="tel" id="guest-phone-${id}" placeholder="XX XXX XXX" inputmode="numeric">
                    </div>
                </div>
            </div>
            <div class="summary-box">
                <span id="s-tot-${id}">${t.stot}</span>
                <span id="total-${id}"></span>
            </div>
            <button class="confirm-btn" id="cbtn${id}" onclick="confirmBooking(${id})">${t.cbtn}</button>
        </div>

        <div class="hv-comments comments-section">
            <button class="comments-toggle-btn" id="cm-btn-${id}" onclick="toggleComments(${id})">
                <span id="cm-btn-label-${id}">${t.commentsTitle}</span> <span class="chev">▾</span>
            </button>
            <div class="comments-panel" id="comments-panel-${id}">
                <div class="panel-inner"><div class="panel-inner-pad">
                    <div class="comments-list" id="comments-${id}"><span class="comments-empty" id="cm-empty-${id}">${t.commentsEmpty}</span></div>
                    <div class="comment-form">
                        <input type="text" id="cname-${id}" placeholder="${t.commentNamePh}">
                        <textarea id="ctext-${id}" rows="2" placeholder="${t.commentTextPh}"></textarea>
                        <button id="cbtn-comment-${id}" onclick="submitComment(${id})">${t.commentSubmit}</button>
                    </div>
                </div></div>
            </div>
        </div>`;
    }

    function openHouse(id) {
        const room = roomsData.find(r => r.id === Number(id));
        if (!room) return;
        openHouseId = room.id;
        hvImgIndex = 0;
        document.getElementById('hv-body').innerHTML = houseDetailHTML_(room);
        document.getElementById('hv-back-label').innerText = translations[currentLang].back;
        document.getElementById('house-view').classList.add('open');
        document.body.classList.add('house-open');
        document.getElementById('house-view').scrollTop = 0;
        // В песочницах предпросмотра менять адрес запрещено — тогда просто
        // работаем без хеша (на настоящем сайте всё как задумано)
        try {
            if (location.hash !== `#h${room.id}`) history.pushState(null, '', `#h${room.id}`);
        } catch (e) { /* предпросмотр/песочница */ }

        // Инициализация формы внутри страницы
        const sel = document.getElementById(`phone-country-${room.id}`);
        if (sel) {
            const t = translations[currentLang];
            sel.innerHTML = PHONE_COUNTRIES.map(c => `<option value="${c.code}">${c.flag} +${c.code}</option>`).join('')
                          + `<option value="other">🌐 ${t.otherCountry}</option>`;
            onCountryChange(room.id);
        }
        initRoomDates_(room.id);
        updatePriceDisplay(room.id);
        calculatePrice(room.id, ROOM_PRICES[room.id]);

        // Лениво подгружаем занятость и отзывы — только для открытого дома
        loadAvailability(room.id);
        if (!detailLoaded.comments[room.id]) {
            loadComments(room.id);
            detailLoaded.comments[room.id] = true;
        }
    }

    function closeHouse() {
        openHouseId = null;
        document.getElementById('house-view').classList.remove('open');
        document.body.classList.remove('house-open');
        try {
            if (location.hash.startsWith('#h')) history.pushState(null, '', location.pathname + location.search);
        } catch (e) { /* предпросмотр/песочница */ }
    }

    window.addEventListener('popstate', () => {
        const m = location.hash.match(/^#h(\d+)$/);
        if (m) openHouse(Number(m[1]));
        else if (openHouseId !== null) closeHouse();
    });

    function hvImgs_() {
        const g = roomGalleries[openHouseId] || [];
        return g.length ? g : [NO_PHOTO_PLACEHOLDER];
    }
    function hvNav(dir) {
        const imgs = hvImgs_();
        hvImgIndex = (hvImgIndex + dir + imgs.length) % imgs.length;
        hvUpdate_();
    }
    function hvGoto(i) { hvImgIndex = i; hvUpdate_(); }
    function hvUpdate_() {
        const imgs = hvImgs_();
        const main = document.getElementById('hv-main-img');
        if (main) main.src = imgs[hvImgIndex];
        const counter = document.getElementById('hv-counter');
        if (counter) counter.innerText = `${hvImgIndex + 1} / ${imgs.length}`;
        const thumbs = document.getElementById('hv-thumbs');
        if (thumbs) [...thumbs.children].forEach((el, i) => el.classList.toggle('on', i === hvImgIndex));
    }

    // ---------- Каталог из houses.json ----------
    // Единый источник каталога: файл houses.json в репозитории.
    // Его правит админка (через прокси), поэтому сайт всегда показывает
    // актуальный список домов и их фото из папки img/houses/.
    async function fetchHousesJson() {
        try {
            const res = await fetch(`houses.json?t=${Date.now()}`, { cache: 'no-store' });
            const data = await res.json();
            const list = Array.isArray(data) ? data : (data.houses || []);
            const visible = list.filter(h => h.visible !== false);
            if (!visible.length) return false;
            roomsData = visible.map(h => ({
                id: Number(h.id),
                name: String(h.name || ''),
                price: Number(h.price) || 0,
                address: String(h.address || ''),
                description: String(h.description || ''),
                bedrooms: Number(h.bedrooms) || 0
            }));
            visible.forEach(h => {
                ROOM_PRICES[h.id] = Number(h.price) || 0;
                roomGalleries[h.id] = Array.isArray(h.photos) ? h.photos.slice() : [];
                if (!roomBookedRanges[h.id]) roomBookedRanges[h.id] = [];
            });
            renderRoomsChips();
            renderCatalog();
            const m = location.hash.match(/^#h(\d+)$/);
            if (m) openHouse(Number(m[1]));
            return true;
        } catch (e) { return false; }
    }

    async function fetchRooms() {
        if (!isConfigured(CONFIG.SHEET_WEBAPP_URL)) return;
        try {
            const res = await fetch(`${CONFIG.SHEET_WEBAPP_URL}?action=rooms&t=${Date.now()}`, { cache: 'no-store' });
            const data = await res.json();
            if (Array.isArray(data) && data.length) {
                roomsData = data.map(r => ({ id: Number(r.id), name: String(r.name), price: Number(r.price) || 0, address: String(r.address || ''), description: String(r.description || '') }));
                roomsData.forEach(r => { ROOM_PRICES[r.id] = r.price; });
                renderCatalog();
                roomsData.forEach(r => loadRoomPhotos(r.id));
                // Если в адресе страницы стоит #h5 — открываем этот дом
                const m = location.hash.match(/^#h(\d+)$/);
                if (m) openHouse(Number(m[1]));
            }
        } catch (e) { /* остаёмся на стартовых номерах */ }
    }

    // ---------- Занятость номеров ----------
    const roomBookedRanges = { 1: [], 2: [], 3: [], 4: [] };

    // На всякий случай приводим любую дату к чистому YYYY-MM-DD, даже если
    // с сервера вдруг придёт полная строка с временем (это и вызывало "каракули").
    function normalizeDateStr_(val) {
        const s = String(val);
        return s.includes('T') ? s.split('T')[0] : s;
    }

    function fmtShort_(isoDate) {
        const parts = normalizeDateStr_(isoDate).split('-');
        return parts.length === 3 ? `${parts[2]}.${parts[1]}` : isoDate;
    }

    // Бейджи "Занято: ..." под календарём убраны по решению владельца:
    // гость видит занятые даты прямо в календаре (они зачёркнуты).
    // Оставляем пустую функцию, чтобы не менять все места вызова.
    function renderAvailabilityNote(id) {
        const note = document.getElementById(`avail-${id}`);
        if (note) note.innerHTML = '';
    }

    // Google Drive перестал отдавать картинки по ссылкам uc?export=view
    // (ошибка 403 при встраивании на сайты). Конвертируем такие ссылки
    // в рабочий thumbnail-формат — это чинит и ранее загруженные фото.
    function fixDriveUrl_(url) {
        const m = String(url).match(/drive\.google\.com\/uc\?export=view&id=([\w-]+)/);
        return m ? `https://drive.google.com/thumbnail?id=${m[1]}&sz=w1600` : url;
    }

    // Кэш занятости из Bnovo: заполняется одним запросом на все номера
    let bnovoBusyCache = null;

    async function fetchBnovoAvailability() {
        if (!isConfigured(CONFIG.BNOVO_BACKEND_URL)) return null;
        if (bnovoBusyCache) return bnovoBusyCache;
        try {
            // Таймаут 8 секунд: бесплатный Render может "просыпаться" ~30-50 сек,
            // в этом случае просто используем данные из Google Sheets.
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 8000);
            const res = await fetch(`${CONFIG.BNOVO_BACKEND_URL}/api/availability?t=${Date.now()}`, { signal: controller.signal, cache: 'no-store' });
            clearTimeout(timer);
            const data = await res.json();
            if (data.ok && Array.isArray(data.busy)) {
                bnovoBusyCache = data.busy;
                return data.busy;
            }
        } catch (e) { /* Bnovo недоступен — работаем через Sheets */ }
        return null;
    }

    async function loadAvailability(roomId) {
        let ranges = [];

        // 1) Пробуем Bnovo (источник правды: включает брони с других каналов)
        const bnovoBusy = await fetchBnovoAvailability();
        if (bnovoBusy) {
            ranges = bnovoBusy
                .filter(b => String(b.room) === String(roomId) || String(b.room_name).includes(String(roomId)))
                .map(b => ({ checkin: normalizeDateStr_(b.checkin), checkout: normalizeDateStr_(b.checkout) }));
        }

        // 2) Добавляем брони из Google Sheets (сделанные через сайт)
        if (isConfigured(CONFIG.SHEET_WEBAPP_URL)) {
            try {
                const res = await fetch(`${CONFIG.SHEET_WEBAPP_URL}?action=availability&room=${roomId}&t=${Date.now()}`, { cache: 'no-store' });
                const data = await res.json();
                const sheetRanges = data.map(r => ({
                    checkin: normalizeDateStr_(r.checkin),
                    checkout: normalizeDateStr_(r.checkout)
                }));
                // объединяем без дублей
                sheetRanges.forEach(sr => {
                    if (!ranges.some(r => r.checkin === sr.checkin && r.checkout === sr.checkout)) {
                        ranges.push(sr);
                    }
                });
            } catch (e) { /* без бэкенда просто не показываем занятые даты */ }
        }

        // Прошедшие брони (выезд уже был) отбрасываем сразу —
        // они не нужны ни календарю, ни проверкам, и не засоряют сайт.
        ranges = ranges.filter(r => r.checkout > today);

        roomBookedRanges[roomId] = ranges;
        renderAvailabilityNote(roomId);
        calculatePrice(roomId, ROOM_PRICES[roomId]);
    }

    function rangesOverlap_(inStr, outStr, ranges) {
        const dIn = new Date(inStr), dOut = new Date(outStr);
        return ranges.some(r => {
            const bIn = new Date(r.checkin), bOut = new Date(r.checkout);
            return dIn < bOut && dOut > bIn;
        });
    }

    const ROOM_PRICES = { 1: 35000, 2: 38000, 3: 40000, 4: 45000 };

    function updatePriceDisplay(id) {
        const el = document.getElementById(`p${id}`);
        if (!el) return;
        el.innerText = translations[currentLang].priceFrom.replace('{p}', ROOM_PRICES[id].toLocaleString());
    }

    async function loadRoomPhotos(roomId) {
        if (!isConfigured(CONFIG.SHEET_WEBAPP_URL)) return;
        try {
            const res = await fetch(`${CONFIG.SHEET_WEBAPP_URL}?action=photos&room=${roomId}&t=${Date.now()}`, { cache: 'no-store' });
            const raw = await res.json();
            const urls = raw.map(fixDriveUrl_);
            const realUrls = urls.filter(u => u !== '__HIDDEN__');
            const isHidden = urls.includes('__HIDDEN__');
            const cover = document.getElementById(`cover-img-${roomId}`);
            const hintEl = document.getElementById(`hint${roomId}`);

            if (realUrls.length) {

                if (cover) cover.src = realUrls[0];
                if (hintEl) hintEl.innerText = `${translations[currentLang].hint} (${realUrls.length})`;

                roomGalleries[roomId] = [];
                if (cover) cover.src = NO_PHOTO_PLACEHOLDER;
                if (hintEl) hintEl.innerText = '';
            }
            // если не скрыто и нет загруженных фото — просто оставляем встроенные стандартные
        } catch (e) { /* остаёмся на стандартных фото */ }

    // Форматирование даты в YYYY-MM-DD по МЕСТНОМУ времени.
    // Важно: НЕ использовать .toISOString() для этого — она переводит в UTC
    // и в часовых поясах впереди UTC (например, Ереван, UTC+4) может сдвинуть
    // дату на день назад, что ломает арифметику с датами в календаре.
    function toLocalISO_(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    const today = toLocalISO_(new Date());
    const tomorrow = toLocalISO_(new Date(Date.now() + 86400000));

        en: ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'],
