        ru: ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'],
        en: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
        am: ['Հունվար', 'Փետրվար', 'Մարտ', 'Ապրիլ', 'Մայիս', 'Հունիս', 'Հուլիս', 'Օգոստոս', 'Սեպտեմբեր', 'Հոկտեմբեր', 'Նոյեմբեր', 'Դեկտեմբեր']
    };

    const calState = { roomId: null, viewYear: 0, viewMonth: 0, checkin: null, checkout: null };

    function toISO_(d) { return toLocalISO_(d); }
    function parseISO_(s) { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); }
    function addDaysISO_(s, n) { const d = parseISO_(s); d.setDate(d.getDate() + n); return toISO_(d); }

    function isDayBooked_(roomId, dateStr) {
        const ranges = roomBookedRanges[roomId] || [];
        return ranges.some(r => dateStr >= r.checkin && dateStr < r.checkout);
    }
    function isRangeClear_(roomId, startStr, endStr) {
        let cursor = startStr;
        let guard = 0;
        while (cursor < endStr && guard < 400) {
            if (isDayBooked_(roomId, cursor)) return false;
            cursor = addDaysISO_(cursor, 1);
            guard++;
        }
        return true;
    }

    function openCalendar(roomId) {
        calState.roomId = roomId;
        const inVal = document.getElementById(`in-${roomId}`).value;
        const outVal = document.getElementById(`out-${roomId}`).value;
        calState.checkin = inVal || null;
        calState.checkout = outVal || null;
        const base = calState.checkin ? parseISO_(calState.checkin) : new Date();
        calState.viewYear = base.getFullYear();
        calState.viewMonth = base.getMonth();
        renderCalendar();
        document.getElementById('calendar-modal').classList.add('open');
    }
    function closeCalendar() {
        document.getElementById('calendar-modal').classList.remove('open');
    }
    function calendarChangeMonth(delta) {
        calState.viewMonth += delta;
        if (calState.viewMonth < 0) { calState.viewMonth = 11; calState.viewYear--; }
        if (calState.viewMonth > 11) { calState.viewMonth = 0; calState.viewYear++; }
        renderCalendar();
    }

    function renderCalendar() {
        const lang = currentLang;
        document.getElementById('calendar-title').innerText = `${MONTH_NAMES[lang][calState.viewMonth]} ${calState.viewYear}`;
        document.getElementById('calendar-weekdays').innerHTML = WEEKDAY_NAMES[lang].map(w => `<span>${w}</span>`).join('');

        const firstOfMonth = new Date(calState.viewYear, calState.viewMonth, 1);
        const startOffset = (firstOfMonth.getDay() + 6) % 7; // понедельник = 0
        const daysInMonth = new Date(calState.viewYear, calState.viewMonth + 1, 0).getDate();
        const todayStr = toISO_(new Date());

        let cellsHtml = '';
        for (let i = 0; i < startOffset; i++) cellsHtml += `<div class="calendar-day empty"></div>`;

        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${calState.viewYear}-${String(calState.viewMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const isPast = dateStr < todayStr;
            const isBooked = isDayBooked_(calState.roomId, dateStr);
            const isToday = dateStr === todayStr;

            let cls = 'calendar-day';
            if (isPast) cls += ' past';
            else if (isBooked) cls += ' booked';
            if (isToday) cls += ' today';

            if (calState.checkin && calState.checkout) {
                if (dateStr === calState.checkin && dateStr === calState.checkout) cls += ' range-single';
                else if (dateStr === calState.checkin) cls += ' range-start';
                else if (dateStr === calState.checkout) cls += ' range-end';
                else if (dateStr > calState.checkin && dateStr < calState.checkout) cls += ' in-range';
            } else if (calState.checkin && dateStr === calState.checkin) {
                cls += ' range-single';
            }

            const clickable = !isPast && !isBooked;
            cellsHtml += `<div class="${cls}" ${clickable ? `onclick="calendarDayClick('${dateStr}')"` : ''}>${day}</div>`;
        }

        document.getElementById('calendar-days').innerHTML = cellsHtml;

        const hints = {
            ru: calState.checkin && !calState.checkout ? 'Выберите дату выезда' : 'Выберите дату заезда',
            en: calState.checkin && !calState.checkout ? 'Select your check-out date' : 'Select your check-in date',
            am: calState.checkin && !calState.checkout ? 'Ընտրեք մեկնման ամսաթիվը' : 'Ընտրեք ժամանման ամսաթիվը'
        };
        document.getElementById('calendar-hint').innerText = hints[lang];
        document.getElementById('calendar-confirm-btn').disabled = !(calState.checkin && calState.checkout);
    }

    function calendarDayClick(dateStr) {
        if (!calState.checkin || (calState.checkin && calState.checkout)) {
            calState.checkin = dateStr;
            calState.checkout = null;
        } else if (dateStr <= calState.checkin) {
            calState.checkin = dateStr;
            calState.checkout = null;
        } else {
            if (isRangeClear_(calState.roomId, calState.checkin, dateStr)) {
                calState.checkout = dateStr;
            } else {
                const conflictMsg = {
                    ru: 'Между этими датами есть занятые дни — выберите другой диапазон',
                    en: "There's a booked day in between — please pick another range",
                    am: 'Այս օրերի միջև կան զբաղված օրեր՝ ընտրեք այլ միջակայք'
                };

                return;
            }
        }
        renderCalendar();
    }

    function calculatePrice(id, pricePerNight) {
        const inEl = document.getElementById(`in-${id}`);
        const outEl = document.getElementById(`out-${id}`);
        if (!inEl || !outEl || !document.getElementById(`cbtn${id}`)) return;
        const inVal = inEl.value;
        const outVal = outEl.value;
        const dateIn = new Date(inVal);
        const dateOut = new Date(outVal);
        const confirmBtn = document.getElementById(`cbtn${id}`);

        if (dateOut > dateIn && rangesOverlap_(inVal, outVal, roomBookedRanges[id] || [])) {
            const overlapMsg = {
                ru: "Эти даты уже заняты — выберите другие",
                en: "These dates are already booked — please choose others",
                am: "Այս օրերն արդեն զբաղված են՝ ընտրեք այլ ամսաթվեր"
            };
            document.getElementById(`total-${id}`).innerText = overlapMsg[currentLang];
            confirmBtn.disabled = true;
        } else if (dateOut > dateIn) {
            const diffTime = Math.abs(dateOut - dateIn);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const total = diffDays * pricePerNight;
            document.getElementById(`total-${id}`).innerText = total.toLocaleString() + " ֏";
            confirmBtn.disabled = false;
        } else {
            const errorMessages = {
                ru: "Выезд должен быть позже заезда",
                en: "Check-out must be after check-in",
                am: "Մեկնումը պետք է լինի ժամանումից հետո"
            };
            document.getElementById(`total-${id}`).innerText = errorMessages[currentLang];
            confirmBtn.disabled = true;
        }
    }

    const langOrder = { am: 0, ru: 1, en: 2 };

    function setLang(lang) {
        currentLang = lang;
        const t = translations[lang];

        document.getElementById('h-title').innerText = t.hTitle;
        document.getElementById('h-sub').innerText = t.hSub;

        document.getElementById('contact-title').innerText = t.contactTitle;
        if (!isConfigured(CONFIG.PHONE_NUMBER)) {
            document.getElementById('contact-phone-label').innerText = t.callLabel;
        }

        document.getElementById('install-title').innerText = t.installTitle;
        document.getElementById('install-sub').innerText = t.installSub;
        document.getElementById('install-btn').innerText = t.installBtn;
        setupInstallBannerForIos();

        // Поиск и фильтры
        const si = document.getElementById('search-input');
        if (si) si.placeholder = t.searchPh;
        const cc = document.getElementById('chip-cheap');
        if (cc) cc.innerText = t.sortCheap;
        const ce = document.getElementById('chip-exp');
        if (ce) ce.innerText = t.sortExp;
        const frl = document.getElementById('f-rooms-lbl');
        if (frl) frl.innerText = t.fRooms;
        renderRoomsChips();
        const ffl = document.getElementById('f-from-lbl');
        if (ffl) ffl.innerText = t.fFrom;
        const ftl = document.getElementById('f-to-lbl');
        if (ftl) ftl.innerText = t.fTo;
        const bl = document.getElementById('hv-back-label');
        if (bl) bl.innerText = t.back;

        // Карточки каталога: перерисовываем (внутри нет полей ввода)
        roomsData.forEach(room => {
            if (room._default && t[`r${room.id}`]) room.name = t[`r${room.id}`];
        });
        renderCatalog();

        // Открытая страница дома: обновляем подписи без перерисовки,
        // чтобы не стереть введённые гостем данные
        roomsData.forEach((room, idx) => {
            const id = room.id;
            const g = (el) => document.getElementById(el);
            if (g(`ph${id}`)) g(`ph${id}`).innerText = t.ph;
            if (g(`l-dates-${id}`)) g(`l-dates-${id}`).innerText = t.ldates;
            if (g(`l-ad-${id}`)) g(`l-ad-${id}`).innerText = t.lad;
            if (g(`l-ch-${id}`)) g(`l-ch-${id}`).innerText = t.lch;
            if (g(`l-pet-${id}`)) g(`l-pet-${id}`).innerText = t.lpet;
            if (g(`l-name-${id}`)) g(`l-name-${id}`).innerText = t.lname;
            if (g(`l-phone-${id}`)) g(`l-phone-${id}`).innerText = t.lphone;
            if (g(`s-tot-${id}`)) g(`s-tot-${id}`).innerText = t.stot;
            if (g(`cbtn${id}`)) g(`cbtn${id}`).innerText = t.cbtn;
            if (g(`cm-btn-label-${id}`)) g(`cm-btn-label-${id}`).innerText = t.commentsTitle;
            const emptyEl = g(`cm-empty-${id}`);
            if (emptyEl) emptyEl.innerText = t.commentsEmpty;
            if (g(`cname-${id}`)) g(`cname-${id}`).placeholder = t.commentNamePh;
            if (g(`ctext-${id}`)) g(`ctext-${id}`).placeholder = t.commentTextPh;
            if (g(`cbtn-comment-${id}`)) g(`cbtn-comment-${id}`).innerText = t.commentSubmit;
            if (g(`guest-name-${id}`)) g(`guest-name-${id}`).placeholder = t.commentNamePh;

            updatePriceDisplay(id);
            renderAvailabilityNote(id);
            calculatePrice(id, ROOM_PRICES[id]);
        });

        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        positionLangSlider(lang);
    }

    function positionLangSlider(lang) {
        const btn = document.getElementById(`btn-${lang}`);
        const slider = document.getElementById('lang-slider');
        if (!btn || !slider) return;
        slider.style.left = `${btn.offsetLeft}px`;
        slider.style.width = `${btn.offsetWidth}px`;
    }
    window.addEventListener('resize', () => positionLangSlider(currentLang));

    // Плавное появление карточек при скролле (переиспользуется при перерисовке домов)
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('is-visible');
                revealObserver.unobserve(entry.target);
            }
        });
    }, { threshold: 0.15 });
    function revealOnScroll() {
        document.querySelectorAll('.reveal:not(.is-visible)').forEach(el => revealObserver.observe(el));
    }
    revealOnScroll();

    // Каталог загружается из houses.json (правится в админке).
    // Занятость и отзывы подгружаются лениво — когда гость открывает дом.
    fetchHousesJson();
    setupContacts();

    setLang('am');
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => positionLangSlider(currentLang));
    }
</script>
